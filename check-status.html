<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Status - St. Teresa School</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #0ea5e9;
            --bg-color: #f0f4f8;
            --text-dark: #1e293b;
            --text-light: #64748b;
        }

        * { box-sizing: border-box; outline: none; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,0.03) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.03) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.03) 0, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Premium Glass Card */
        .status-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            text-align: center;
            transition: all 0.3s ease;
        }

        .header-icon {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #eff6ff 0%, #e0e7ff 100%);
            color: var(--primary);
            font-size: 30px;
            border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 20px auto;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.1);
        }

        h2 { 
            background: linear-gradient(135deg, #1e293b, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            font-size: 28px;
            margin-bottom: 8px; 
            letter-spacing: -0.5px;
        }

        p.subtitle { color: var(--text-light); font-size: 15px; margin-bottom: 30px; font-weight: 400; }

        /* Modern Input Group */
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; font-size: 18px; transition: 0.3s;
        }
        input {
            width: 100%; padding: 16px 16px 16px 50px;
            border: 2px solid #e2e8f0; border-radius: 16px;
            font-size: 15px; font-weight: 600; color: var(--text-dark);
            background: #f8fafc; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px;
        }
        input::placeholder { color: #94a3b8; font-weight: 400; text-transform: none; }
        input:focus { 
            border-color: var(--primary); background: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); 
        }
        input:focus + i, .input-group i.active { color: var(--primary); }

        /* Premium Gradient Button */
        button {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white; border: none; border-radius: 16px;
            font-size: 16px; font-weight: 700; letter-spacing: 0.5px;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(79, 70, 229, 0.5); }
        button:disabled { opacity: 0.7; transform: none; cursor: not-allowed; }

        /* Animation for Results */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #resultsContainer { margin-top: 30px; text-align: left; }

        /* --- PREMIUM ADMISSION RESULT CARD --- */
        .result-box {
            background: #fff; padding: 20px; border-radius: 20px;
            border: 1px solid #f1f5f9; box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            margin-bottom: 15px; animation: fadeInUp 0.4s ease forwards;
            position: relative; overflow: hidden;
        }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .app-id { font-size: 12px; font-weight: 700; color: #94a3b8; letter-spacing: 1px; }

        .badge { padding: 6px 12px; border-radius: 30px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: inline-flex; align-items: center; gap: 5px; }
        .badge-pending { background: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        .badge-approved { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .badge-rejected { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }

        h3.stu-name { font-size: 20px; font-weight: 800; color: var(--text-dark); margin-bottom: 4px; }
        p.stu-class { font-size: 14px; color: var(--text-light); font-weight: 500; margin-bottom: 15px; }

        /* --- PREMIUM CERTIFICATE CARD --- */
        .cert-card {
            padding: 20px; border-radius: 20px; margin-bottom: 15px;
            animation: fadeInUp 0.4s ease forwards; position: relative; overflow: hidden;
            border-left: 5px solid;
        }
        .cert-tc { background: linear-gradient(to right, #ffffff, #f5f3ff); border-color: #7c3aed; box-shadow: 0 10px 30px rgba(124, 58, 237, 0.05); }
        .cert-bonafide { background: linear-gradient(to right, #ffffff, #fdf4ff); border-color: #c026d3; box-shadow: 0 10px 30px rgba(192, 38, 211, 0.05); }

        .cert-icon-bg { position: absolute; right: -15px; bottom: -15px; font-size: 90px; opacity: 0.04; }
        .cert-tc .cert-icon-bg { color: #7c3aed; }
        .cert-bonafide .cert-icon-bg { color: #c026d3; }

        .cert-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; margin-bottom: 10px;}
        .cert-tc .cert-label { color: #7c3aed; }
        .cert-bonafide .cert-label { color: #c026d3; }

        .cert-meta { display: grid; grid-template-columns: 1fr; gap: 5px; margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(0,0,0,0.1); font-size: 13px; color: #475569; font-weight: 500; }
        .cert-meta b { color: #0f172a; }

        .back-link { display: inline-block; margin-top: 25px; text-decoration: none; color: var(--text-light); font-size: 14px; font-weight: 600; transition: 0.3s; }
        .back-link:hover { color: var(--primary); transform: translateX(-3px); }

        /* Error State */
        .error-box { background: #fef2f2; border: 1px solid #fecaca; padding: 20px; border-radius: 16px; text-align: center; color: #b91c1c; animation: fadeInUp 0.3s ease; }
    </style>
</head>
<body>

    <div class="status-card">
        <div class="header-icon"><i class="fas fa-magnifying-glass-location"></i></div>
        <h2>Track Status</h2>
        <p class="subtitle">Enter your Mobile No, STES ID, TC No, or Bonafide No</p>

        <div class="input-group">
            <i class="fas fa-search" id="inputIcon"></i>
            <input type="text" id="searchInput" placeholder="Ex: 96937... or STES26..." 
                   oninput="this.value = this.value.toUpperCase().trim();"
                   onfocus="document.getElementById('inputIcon').style.color='#4f46e5'"
                   onblur="document.getElementById('inputIcon').style.color='#94a3b8'">
        </div>

        <button id="searchBtn" onclick="checkStatus()">
            <i class="fas fa-location-arrow"></i> Fetch Details
        </button>

        <div id="resultsContainer"></div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <script>
        // Your web app's Firebase configuration

        if (!firebase.apps.length) {

        }

        // Adding Enter Key Listener
        document.getElementById("searchInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkStatus();
            }
        });

        async function checkStatus() {
            const input = document.getElementById('searchInput').value;
            const resultsContainer = document.getElementById('resultsContainer');
            const btn = document.getElementById('searchBtn');

            if (input.length < 4) {
                resultsContainer.innerHTML = `
                    <div class="error-box">
                        <i class="fas fa-exclamation-circle" style="font-size:24px; margin-bottom:10px;"></i>
                        <h4 style="margin-bottom:5px;">Invalid Input</h4>
                        <p style="font-size:13px; margin:0;">Please enter at least 4 characters.</p>
                    </div>`;
                return;
            }

            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Searching...';
            btn.disabled = true;
            resultsContainer.innerHTML = '';

            try {
                let admissionsData = [];
                let certsData = [];

                // ==========================================
                // 1. DATA FETCHING LOGIC
                // ==========================================

                if (/^\d+$/.test(input)) {
                    // Mobile Number
                    let admSnap = await db.collection('admissions').where('mobile', '==', input).get();
                    if(admSnap.empty) admSnap = await db.collection('admissions').where('parentPhone', '==', input).get();
                    admSnap.forEach(doc => admissionsData.push(doc.data()));

                    let stuSnap = await db.collection('students').where('mobile', '==', input).get();
                    let stesIds = [];
                    stuSnap.forEach(doc => { if(doc.data().stesID) stesIds.push(doc.data().stesID); });

                    for (let id of stesIds) {
                        let cSnap = await db.collection('certRecords').where('admNo', '==', id).get();
                        cSnap.forEach(doc => certsData.push(doc.data()));
                    }

                } else if (input.startsWith('TC/')) {
                    // TC Number Search
                    let cSnap = await db.collection('certRecords').where('tcNo', '==', input).get();
                    cSnap.forEach(doc => certsData.push(doc.data()));

                } else if (input.startsWith('BON/')) {
                    // Bonafide Number Search
                    let cSnap = await db.collection('certRecords').where('refNo', '==', input).get();
                    cSnap.forEach(doc => certsData.push(doc.data()));

                } else {
                    // App ID or STES ID
                    let admSnap = await db.collection('admissions').where('appId', '==', input).get();
                    admSnap.forEach(doc => admissionsData.push(doc.data()));

                    let cSnap = await db.collection('certRecords').where('admNo', '==', input).get();
                    cSnap.forEach(doc => certsData.push(doc.data()));
                }

                // ==========================================
                // 2. HTML RENDERING LOGIC (PREMIUM UI)
                // ==========================================

                let finalHtml = "";

                // Render Admissions Data
                if (admissionsData.length > 0) {
                    admissionsData.forEach(data => {
                        const sName = data.name || data.studentName || "N/A";
                        const sClass = data.admissionClass || data.class || "N/A";
                        const sId = data.appId || "N/A";
                        const status = data.status || "Pending";

                        let icon = 'fa-clock'; let badgeClass = 'badge-pending';
                        if(status === 'Approved') { icon = 'fa-check-circle'; badgeClass = 'badge-approved'; }
                        else if(status === 'Rejected') { icon = 'fa-times-circle'; badgeClass = 'badge-rejected'; }

                        finalHtml += `
                            <div class="result-box">
                                <div class="result-header">
                                    <span class="badge ${badgeClass}"><i class="fas ${icon}"></i> ${status}</span>
                                    <span class="app-id">#${sId}</span>
                                </div>
                                <h3 class="stu-name">${sName}</h3>
                                <p class="stu-class"><i class="fas fa-graduation-cap" style="color:#94a3b8; margin-right:5px;"></i> Class: ${sClass}</p>
                            </div>
                        `;
                    });
                }

                // Render Certificate Data
                if (certsData.length > 0) {
                    certsData.forEach(cert => {
                        const isTC = cert.type === 'TC';
                        const cardClass = isTC ? 'cert-tc' : 'cert-bonafide';
                        const labelText = isTC ? 'Transfer Certificate' : 'Bonafide Certificate';
                        const iconBg = isTC ? 'fa-file-signature' : 'fa-certificate';
                        const number = isTC ? cert.tcNo : cert.refNo;
                        const extraIcon = isTC ? 'fa-sign-out-alt' : 'fa-bullseye';
                        const extraInfoText = isTC ? `Class Left: <b>${cert.className || 'N/A'}</b>` : `Purpose: <b>${cert.purpose || 'General'}</b>`;

                        finalHtml += `
                            <div class="cert-card ${cardClass}">
                                <i class="fas ${iconBg} cert-icon-bg"></i>
                                <div class="cert-label"><i class="fas fa-shield-check"></i> ${labelText} Generated</div>
                                <h3 class="stu-name">${cert.name}</h3>
                                <div class="cert-meta">
                                    <div><i class="fas fa-hashtag" style="color:#94a3b8; width:16px;"></i> No: <b>${number}</b></div>
                                    <div><i class="fas fa-id-badge" style="color:#94a3b8; width:16px;"></i> STES ID: <b>${cert.admNo}</b></div>
                                    <div><i class="fas ${extraIcon}" style="color:#94a3b8; width:16px;"></i> ${extraInfoText}</div>
                                    <div><i class="fas fa-calendar-alt" style="color:#94a3b8; width:16px;"></i> Issued On: <b>${cert.issueDate || 'Recent'}</b></div>
                                </div>
                            </div>
                        `;
                    });
                }

                // Empty State
                if (finalHtml === "") {
                    resultsContainer.innerHTML = `
                        <div class="error-box">
                            <i class="fas fa-search-minus" style="font-size:28px; margin-bottom:10px; opacity:0.8;"></i>
                            <h4 style="margin-bottom:5px;">No Record Found</h4>
                            <p style="font-size:13px; margin:0;">We couldn't find any admission or certificate with this detail. Double-check your input.</p>
                        </div>
                    `;
                } else {
                    resultsContainer.innerHTML = finalHtml;
                }

            } catch (error) {
                console.error("Search Error:", error);
                resultsContainer.innerHTML = `
                    <div class="error-box">
                        <i class="fas fa-wifi" style="font-size:24px; margin-bottom:10px;"></i>
                        <h4 style="margin-bottom:5px;">Connection Error</h4>
                        <p style="font-size:13px; margin:0;">Unable to connect to the server. Please check your internet and try again.</p>
                    </div>`;
            } finally {
                btn.innerHTML = '<i class="fas fa-location-arrow"></i> Fetch Details';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
