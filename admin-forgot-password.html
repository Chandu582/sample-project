<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - St. Teresa School</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }

        .card { 
            background: white; padding: 40px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;
        }

        h2 { margin-top: 0; color: #333; font-weight: 700; }

        /* Steps Logic */
        .step { display: none; animation: fadeIn 0.5s; }
        .step.active { display: block; }

        input { 
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; 
            border-radius: 8px; box-sizing: border-box; font-size: 14px;
        }
        input:focus { border-color: #1a73e8; outline: none; }

        button {
            width: 100%; padding: 12px; background: #d32f2f; color: white; border: none;
            border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 15px;
        }
        button:hover { background: #b71c1c; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="card">

        <div id="step1" class="step active">
            <div style="font-size: 40px; color: #d32f2f; margin-bottom: 10px;"><i class="fas fa-user-lock"></i></div>
            <h2>Reset Password</h2>
            <p style="color:#666; font-size:13px; margin-bottom: 20px;">
                Enter your Username and the Secret Recovery Code you set in the database.
            </p>

            <input type="text" id="vUser" placeholder="Username (e.g. bri373&!₹)geieg)">
            <input type="password" id="vCode" placeholder="Recovery Code (e.g. Es_#-2627:*-₹'6)">

            <button onclick="verifyUser()">Verify Identity</button>
            <a href="admin-login.html" style="display:block; margin-top:15px; color:#555; text-decoration:none; font-size: 13px;">Cancel</a>
        </div>

        <div id="step2" class="step">
            <div style="font-size: 40px; color: green; margin-bottom: 10px;"><i class="fas fa-check-circle"></i></div>
            <h2>New Password</h2>
            <p style="color:green; font-size:13px; margin-bottom: 20px;">Identity Verified! Set your new password.</p>

            <input type="password" id="newPass" placeholder="Enter New Password">
            <input type="password" id="confirmPass" placeholder="Confirm New Password">

            <button onclick="resetPassword()" style="background: #1a73e8;">Update Password</button>
        </div>

    </div>

    <script>
        // FIREBASE CONFIGURATION

        // 1. VERIFY USER FUNCTION
        function verifyUser() {
            const user = document.getElementById('vUser').value.trim();
            const code = document.getElementById('vCode').value.trim();
            const btn = document.querySelector('#step1 button');

            if(!user || !code) return alert("Please fill all details!");

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
            btn.disabled = true;

            // Database Check
            db.collection('settings').doc('admin_cred').get().then(doc => {
                if(doc.exists) {
                    const data = doc.data();

                    // Check if Username AND Recovery Code match
                    if(data.username === user && data.recovery_code === code) {
                        // Match Found -> Go to Step 2
                        document.getElementById('step1').classList.remove('active');
                        document.getElementById('step2').classList.add('active');
                    } else {
                        alert("❌ Wrong Username or Recovery Code!");
                        btn.innerHTML = 'Verify Identity';
                        btn.disabled = false;
                    }
                } else {
                    alert("System Error: Database not set up.");
                    btn.disabled = false;
                }
            }).catch(err => {
                alert("Error: " + err.message);
                btn.disabled = false;
            });
        }

        // 2. RESET PASSWORD FUNCTION
        function resetPassword() {
            const p1 = document.getElementById('newPass').value;
            const p2 = document.getElementById('confirmPass').value;
            const btn = document.querySelector('#step2 button');

            if(!p1 || !p2) return alert("Please enter password!");
            if(p1 !== p2) return alert("Passwords do not match!");

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
            btn.disabled = true;

            // Update Password in Database
            db.collection('settings').doc('admin_cred').update({
                password: p1
            }).then(() => {
                alert("✅ Password Reset Successfully! Login with new password.");
                window.location.href = "admin-login.html";
            }).catch(err => {
                alert("Error: " + err.message);
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
