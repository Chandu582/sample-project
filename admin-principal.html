<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Principal Message</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="config.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; padding: 20px; }
        .admin-box { max-width: 750px; margin: 30px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-top: 0; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 500; margin-bottom: 8px; color: #555; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; box-sizing: border-box; }

        /* --- ADVANCED EDITOR STYLE --- */
        .editor-container { border: 1px solid #ccc; border-radius: 8px; overflow: hidden; background: #fff; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }

        .editor-toolbar {
            background: #f8f9fa; padding: 8px; border-bottom: 1px solid #ddd;
            display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
        }

        /* Buttons */
        .toolbar-btn {
            background: white; border: 1px solid #ccc; padding: 6px 10px; cursor: pointer;
            border-radius: 4px; font-size: 14px; color: #444; transition: 0.2s; min-width: 32px;
        }
        .toolbar-btn:hover { background: #e2e8f0; color: #1a73e8; border-color: #b3b3b3; }

        /* Dropdowns (Font & Size) */
        .toolbar-select {
            padding: 5px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 13px; color: #444;
        }

        /* Color Picker Wrapper */
        .color-wrapper {
            display: flex; align-items: center; border: 1px solid #ccc; 
            padding: 3px 6px; border-radius: 4px; background: white; gap: 5px;
        }
        .color-wrapper input[type="color"] {
            border: none; width: 20px; height: 20px; cursor: pointer; padding: 0; background: none;
        }

        /* Editor Area */
        #editor-content {
            min-height: 250px; max-height: 500px; overflow-y: auto;
            padding: 20px; outline: none; font-size: 14px; line-height: 1.6; color: #333;
        }
        #editor-content:focus { background-color: #fffff8; } /* Thoda yellow focus */

        /* Image Preview */
        .img-preview { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #1a73e8; display: block; margin: 10px auto; background: #eee; }

        button.main-btn { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button.main-btn:hover { background: #0d47a1; }
        button:disabled { background: #ccc; }

        .btn-delete { background: #ff4444; margin-top: 15px; width: 100%; padding: 10px; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-box">
    <a href="admin-dashboard.html" style="text-decoration:none; color:#666; font-size:14px;"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    <h2><i class="fas fa-chalkboard-teacher"></i> Leadership Messages</h2>

    <!-- Tab Switcher -->
    <div style="display:flex; gap:10px; margin-bottom:25px; background:#f4f7f6; padding:6px; border-radius:10px;">
        <button id="tab-p" onclick="switchTab('principal')"
            style="flex:1; padding:10px; border:none; border-radius:8px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; background:#1a73e8; color:white; transition:0.2s;">
            <i class="fas fa-user-tie"></i> Principal's Desk
        </button>
        <button id="tab-d" onclick="switchTab('director')"
            style="flex:1; padding:10px; border:none; border-radius:8px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; background:transparent; color:#555; transition:0.2s;">
            <i class="fas fa-crown"></i> Director's Desk
        </button>
    </div>

    <!-- ═══ PRINCIPAL PANEL ═══ -->
    <div id="panel-principal">
        <div class="form-group" style="text-align:center;">
            <img id="pPreview" src="https://via.placeholder.com/150?text=No+Image" class="img-preview">
            <input type="file" id="pFile" accept="image/*" style="margin-top:10px;">
            <input type="hidden" id="pPhotoUrl">
        </div>

        <div class="form-group">
            <label>Principal's Name</label>
            <input type="text" id="pName" placeholder="Ex: Mr. Chandu😎😄">
        </div>

        <div class="form-group">
            <label>Qualification</label>
            <input type="text" id="pQual" placeholder="Ex: M.A., B.Ed. etc..">
        </div>

        <div class="form-group">
            <label>Message (Design & Format Here)</label>
            <div class="editor-container">
                <div class="editor-toolbar">
                    <select onchange="formatDoc('p-editor', 'fontName', this.value)" class="toolbar-select" title="Font Style">
                        <option value="Poppins">Default Font</option>
                        <option value="Arial">Arial</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Courier New">Courier</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Impact">Impact</option>
                    </select>
                    <select onchange="formatDoc('p-editor', 'fontSize', this.value)" class="toolbar-select" style="width:70px;">
                        <option value="3">Normal</option><option value="1">Small</option>
                        <option value="2">Medium</option><option value="4">Large</option>
                        <option value="5">X-Large</option><option value="6">Huge</option><option value="7">Giant</option>
                    </select>
                    <div style="width:1px; height:25px; background:#ddd; margin:0 5px;"></div>
                    <button class="toolbar-btn" onclick="formatDoc('p-editor','bold')" title="Bold"><i class="fas fa-bold"></i></button>
                    <button class="toolbar-btn" onclick="formatDoc('p-editor','italic')" title="Italic"><i class="fas fa-italic"></i></button>
                    <button class="toolbar-btn" onclick="formatDoc('p-editor','underline')" title="Underline"><i class="fas fa-underline"></i></button>
                    <div class="color-wrapper" title="Text Color">
                        <i class="fas fa-font" style="font-size:12px; color:#555;"></i>
                        <input type="color" onchange="formatDoc('p-editor','foreColor', this.value)">
                    </div>
                    <div class="color-wrapper" title="Highlight Color">
                        <i class="fas fa-highlighter" style="font-size:12px; color:#555;"></i>
                        <input type="color" value="#ffffff" onchange="formatDoc('p-editor','hiliteColor', this.value)">
                    </div>
                    <div style="width:1px; height:25px; background:#ddd; margin:0 5px;"></div>
                    <button class="toolbar-btn" onclick="formatDoc('p-editor','justifyLeft')"><i class="fas fa-align-left"></i></button>
                    <button class="toolbar-btn" onclick="formatDoc('p-editor','justifyCenter')"><i class="fas fa-align-center"></i></button>
                    <button class="toolbar-btn" onclick="formatDoc('p-editor','insertOrderedList')"><i class="fas fa-list-ol"></i></button>
                    <button class="toolbar-btn" onclick="formatDoc('p-editor','insertUnorderedList')"><i class="fas fa-list-ul"></i></button>
                </div>
                <div id="p-editor" contenteditable="true" style="min-height:250px; max-height:500px; overflow-y:auto; padding:20px; outline:none; font-size:14px; line-height:1.6; color:#333;">
                    Type your message here...
                </div>
            </div>
            <small style="color:#666; font-size:11px;">* Use size/color carefully. "Arial" or "Georgia" looks professional.</small>
        </div>

        <button onclick="saveData('principal')" id="pSaveBtn" class="main-btn"><i class="fas fa-save"></i> Save / Update Principal Message</button>
        <button onclick="deleteData('principal')" class="btn-delete" id="pDelBtn" style="display:none;">
            <i class="fas fa-trash"></i> Delete Principal Message
        </button>
    </div>

    <!-- ═══ DIRECTOR PANEL ═══ -->
    <div id="panel-director" style="display:none;">
        <div class="form-group" style="text-align:center;">
            <img id="dPreview" src="https://via.placeholder.com/150?text=No+Image" class="img-preview" style="border-color:#00897b;">
            <input type="file" id="dFile" accept="image/*" style="margin-top:10px;">
            <input type="hidden" id="dPhotoUrl">
        </div>

        <div class="form-group">
            <label>Director's Name</label>
            <input type="text" id="dName" placeholder="Ex: Mrs. Sunita Devi">
        </div>

        <div class="form-group">
            <label>Qualification</label>
            <input type="text" id="dQual" placeholder="Ex: M.B.A., Ph.D. etc..">
        </div>

        <div class="form-group">
            <label>Message (Design & Format Here)</label>
            <div class="editor-container" style="border-color:#00897b44;">
                <div class="editor-toolbar">
                    <select onchange="formatDoc('d-editor', 'fontName', this.value)" class="toolbar-select" title="Font Style">
                        <option value="Poppins">Default Font</option>
                        <option value="Arial">Arial</option>
                        <option value="Georgia">Georgia</option>
                        <option value="Courier New">Courier</option>
                        <option value="Verdana">Verdana</option>
                        <option value="Impact">Impact</option>
                    </select>
                    <select onchange="formatDoc('d-editor', 'fontSize', this.value)" class="toolbar-select" style="width:70px;">
                        <option value="3">Normal</option><option value="1">Small</option>
                        <option value="2">Medium</option><option value="4">Large</option>
                        <option value="5">X-Large</option><option value="6">Huge</option><option value="7">Giant</option>
                    </select>
                    <div style="width:1px; height:25px; background:#ddd; margin:0 5px;"></div>
                    <button class="toolbar-btn" onclick="formatDoc('d-editor','bold')"><i class="fas fa-bold"></i></button>
                    <button class="toolbar-btn" onclick="formatDoc('d-editor','italic')"><i class="fas fa-italic"></i></button>
                    <button class="toolbar-btn" onclick="formatDoc('d-editor','underline')"><i class="fas fa-underline"></i></button>
                    <div class="color-wrapper" title="Text Color">
                        <i class="fas fa-font" style="font-size:12px; color:#555;"></i>
                        <input type="color" onchange="formatDoc('d-editor','foreColor', this.value)">
                    </div>
                    <div class="color-wrapper" title="Highlight Color">
                        <i class="fas fa-highlighter" style="font-size:12px; color:#555;"></i>
                        <input type="color" value="#ffffff" onchange="formatDoc('d-editor','hiliteColor', this.value)">
                    </div>
                    <div style="width:1px; height:25px; background:#ddd; margin:0 5px;"></div>
                    <button class="toolbar-btn" onclick="formatDoc('d-editor','justifyLeft')"><i class="fas fa-align-left"></i></button>
                    <button class="toolbar-btn" onclick="formatDoc('d-editor','justifyCenter')"><i class="fas fa-align-center"></i></button>
                    <button class="toolbar-btn" onclick="formatDoc('d-editor','insertOrderedList')"><i class="fas fa-list-ol"></i></button>
                    <button class="toolbar-btn" onclick="formatDoc('d-editor','insertUnorderedList')"><i class="fas fa-list-ul"></i></button>
                </div>
                <div id="d-editor" contenteditable="true" style="min-height:250px; max-height:500px; overflow-y:auto; padding:20px; outline:none; font-size:14px; line-height:1.6; color:#333;">
                    Type your message here...
                </div>
            </div>
            <small style="color:#666; font-size:11px;">* Use size/color carefully. "Georgia" looks very professional for Director's message.</small>
        </div>

        <button onclick="saveData('director')" id="dSaveBtn" class="main-btn" style="background:#00897b;"><i class="fas fa-save"></i> Save / Update Director Message</button>
        <button onclick="deleteData('director')" class="btn-delete" id="dDelBtn" style="display:none;">
            <i class="fas fa-trash"></i> Delete Director Message
        </button>
    </div>
</div>

<script>

    const cloudName = "dngejhffd";
    const uploadPreset = "school_gallery";

    // ── TAB SWITCH ──
    function switchTab(tab) {
        const isP = tab === 'principal';
        document.getElementById('panel-principal').style.display = isP ? 'block' : 'none';
        document.getElementById('panel-director').style.display = isP ? 'none' : 'block';
        document.getElementById('tab-p').style.background = isP ? '#1a73e8' : 'transparent';
        document.getElementById('tab-p').style.color = isP ? 'white' : '#555';
        document.getElementById('tab-d').style.background = isP ? 'transparent' : '#00897b';
        document.getElementById('tab-d').style.color = isP ? '#555' : 'white';
    }

    // ── EDITOR ──
    function formatDoc(editorId, cmd, value = null) {
        document.getElementById(editorId).focus();
        document.execCommand(cmd, false, value);
    }

    // ── LOAD ──
    function loadData(type) {
        const isP = type === 'principal';
        const p = isP ? 'p' : 'd';
        db.collection('settings').doc(type).get().then(doc => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById(p + 'Name').value = data.name || '';
                document.getElementById(p + 'Qual').value = data.qualification || '';
                document.getElementById(p + '-editor').innerHTML = data.message || '';
                document.getElementById(p + 'PhotoUrl').value = data.photo || '';
                if (data.photo) document.getElementById(p + 'Preview').src = data.photo;
                document.getElementById(p + 'DelBtn').style.display = 'block';
            }
        });
    }

    // ── SAVE ──
    async function saveData(type) {
        const isP = type === 'principal';
        const p = isP ? 'p' : 'd';
        const label = isP ? 'Principal' : 'Director';
        const name = document.getElementById(p + 'Name').value;
        const qual = document.getElementById(p + 'Qual').value;
        const msgHTML = document.getElementById(p + '-editor').innerHTML;
        const fileInput = document.getElementById(p + 'File');
        const oldPhoto = document.getElementById(p + 'PhotoUrl').value;
        const btn = document.getElementById(p + 'SaveBtn');

        if (!name || document.getElementById(p + '-editor').innerText.trim() === '') {
            alert('Name and Message are required!'); return;
        }

        btn.disabled = true;
        btn.innerHTML = 'Uploading & Saving...';
        let finalPhoto = oldPhoto;

        try {
            if (fileInput.files.length > 0) {
                const fd = new FormData();
                fd.append('file', fileInput.files[0]);
                fd.append('upload_preset', uploadPreset);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, { method: 'POST', body: fd });
                const json = await res.json();
                finalPhoto = json.secure_url;
            }

            await db.collection('settings').doc(type).set({
                name, qualification: qual, message: msgHTML, photo: finalPhoto,
                updatedAt: new Date().toISOString()
            });

            alert(label + ' Message Updated Successfully!');
            location.reload();
        } catch (e) {
            console.error(e);
            alert('Error: ' + e.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Save / Update ' + label + ' Message';
        }
    }

    // ── DELETE ──
    function deleteData(type) {
        const label = type === 'principal' ? 'Principal' : 'Director';
        if (confirm('Are you sure? This will hide the ' + label + ' section.')) {
            db.collection('settings').doc(type).delete().then(() => location.reload());
        }
    }

    // ── SECURITY ──
    firebase.auth().onAuthStateChanged((user) => {
        const isLoggedIn = sessionStorage.getItem("isLoggedIn") === "true";
        const userData = JSON.parse(sessionStorage.getItem("userData") || "{}");

        if (user && isLoggedIn && userData.role === 'admin') {
            db.collection('admins').doc(user.uid).get().then((doc) => {
                if (doc.exists && doc.data().role === 'SuperAdmin') {
                    loadData('principal');
                    loadData('director');
                } else {
                    auth.signOut().then(() => window.location.replace("admin-login.html"));
                }
            });
        } else {
            window.location.replace("admin-login.html");
        }
    });
</script>

</body>
</html>
