<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Notices - Admin</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #f3f4f6; padding: 20px; max-width: 900px; margin: auto; }

        .header { background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h2 { margin: 0; color: #f59e0b; display: flex; align-items: center; gap: 10px; }
        .back-btn { text-decoration: none; color: #555; font-weight: 500; display: flex; align-items: center; gap: 5px; }

        /* COMMON CARD STYLE */
        .admin-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; position: relative; }

        /* 1. MARQUEE SECTION (Blue Theme) */
        .marquee-card { border-top: 5px solid #2563eb; }
        .marquee-title { font-size: 18px; font-weight: 700; color: #1e3a8a; margin-top: 0; display: flex; align-items: center; gap: 10px; }

        .marquee-input-group { display: flex; gap: 10px; margin-top: 15px; }
        .marquee-input { flex: 1; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 15px; outline: none; }
        .marquee-input:focus { border-color: #2563eb; }

        .btn-update { background: #2563eb; color: white; border: none; padding: 0 25px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-update:hover { background: #1d4ed8; }

        .btn-clear { background: #fee2e2; color: #dc2626; border: none; padding: 0 15px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 5px; }
        .btn-clear:hover { background: #fca5a5; }

        /* 2. NOTICE BOARD SECTION (Orange Theme) */
        .notice-card { border-top: 5px solid #f59e0b; }
        .notice-head { font-size: 18px; font-weight: 700; color: #92400e; margin-top: 0; margin-bottom: 20px; }

        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; color: #444; display: block; margin-bottom: 8px; font-size: 14px; }
        .title-input { width: 100%; padding: 12px; font-size: 16px; font-weight: 600; border: 1px solid #ddd; border-radius: 8px; outline: none; box-sizing: border-box; }
        textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 100px; box-sizing: border-box; }

        .file-upload-box { border: 2px dashed #ccc; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; background: #fafafa; transition: 0.3s; }
        .file-upload-box:hover { border-color: #f59e0b; background: #fffcf5; }

        .btn-publish { width: 100%; background: #f59e0b; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-publish:hover { background: #d97706; }
        .btn-publish:disabled { background: #ccc; cursor: not-allowed; }

        /* LIST ITEM */
        .notice-item { background: white; border-radius: 10px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: flex-start; }
        .n-info h4 { margin: 0 0 5px 0; font-size: 16px; color: #333; }
        .n-info p { margin: 0 0 8px 0; font-size: 13px; color: #666; }
        .n-meta { font-size: 12px; color: #999; display: flex; gap: 10px; align-items: center; }
        .attachment-badge { background: #e0f2fe; color: #0284c7; padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 11px; }
        .btn-delete { background: #fee2e2; color: #dc2626; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fas fa-bullhorn"></i> Manage Notices</h2>
        <a href="admin-dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>

    <div class="admin-card marquee-card">
        <h3 class="marquee-title">
            <i class="fas fa-bolt"></i> Flash / Marquee Notice (Home Page)
        </h3>
        <p style="font-size:13px; color:#666; margin:0;">Ye text home page par chalti hui patti (scroll) mein dikhega.</p>

        <div class="marquee-input-group">
            <input type="text" id="marqueeText" class="marquee-input" placeholder="Example: Admission Open for 2025-26...">
            <button onclick="updateMarquee()" class="btn-update">Update</button>
            <button onclick="clearMarquee()" class="btn-clear" title="Remove Marquee"><i class="fas fa-trash"></i></button>
        </div>
    </div>

    <div class="admin-card notice-card">
        <h3 class="notice-head"><i class="fas fa-clipboard-list"></i> Add to Notice Board</h3>

        <div class="form-group"><input type="text" id="nTitle" class="title-input" placeholder="Notice Title (e.g. Holiday Announcement)"></div>
        <div class="form-group"><textarea id="nBody" placeholder="Write full details here..."></textarea></div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div>
                <label>Notice Date</label>
                <input type="date" id="nDate" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; box-sizing: border-box;">
            </div>
            <div>
                <label>Attachment (PDF/Image)</label>
                <div class="file-upload-box" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-paperclip"></i> <span id="fileName">Attach File</span>
                    <input type="file" id="fileInput" style="display:none" onchange="showFileName()">
                </div>
            </div>
        </div>
        <button onclick="publishNotice()" class="btn-publish" id="pubBtn"><i class="fas fa-paper-plane"></i> Publish Notice</button>
    </div>

    <h3 style="color:#555; margin-left:5px;">Published Notices</h3>
    <div id="noticeListArea"><p style="text-align:center; color:#999;">Loading...</p></div>

    <script>

        const cloudName = "dngejhffd";       
        const uploadPreset = "school_gallery"; 

        // --- PART 1: MARQUEE LOGIC ---
        // Load current marquee text
        db.collection('settings').doc('flash_notice').onSnapshot(doc => {
            if(doc.exists) {
                document.getElementById('marqueeText').value = doc.data().text || '';
            }
        });

        function updateMarquee() {
            const txt = document.getElementById('marqueeText').value.trim();
            db.collection('settings').doc('flash_notice').set({ text: txt })
                .then(() => alert("Flash Notice Updated!"))
                .catch(err => alert("Error: " + err.message));
        }

        function clearMarquee() {
            if(confirm("Remove flash notice from Home Page?")) {
                db.collection('settings').doc('flash_notice').set({ text: "" })
                    .then(() => {
                        document.getElementById('marqueeText').value = "";
                        alert("Flash Notice Removed!");
                    });
            }
        }

        // --- PART 2: NOTICE BOARD LOGIC ---
        function showFileName() {
            const file = document.getElementById('fileInput').files[0];
            if(file) document.getElementById('fileName').innerText = file.name;
        }

        async function publishNotice() {
            const title = document.getElementById('nTitle').value.trim();
            const body = document.getElementById('nBody').value.trim();
            let date = document.getElementById('nDate').value;
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('pubBtn');

            if(!title || !body) return alert("Title and Body are required!");
            if(!date) date = new Date().toISOString().split('T')[0];

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
            btn.disabled = true;

            let fileUrl = "";
            let fileType = "";

            try {
                if(file) {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', uploadPreset);

                    const isPdf = file.type === 'application/pdf';
                    const resourceType = isPdf ? 'raw' : 'image'; 
                    fileType = isPdf ? 'pdf' : 'image';

                    const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/${resourceType}/upload`, {
                        method: 'POST', body: formData
                    });
                    const data = await res.json();

                    if(data.error) throw new Error(data.error.message);
                    fileUrl = data.secure_url;
                }

                await db.collection('notices').add({
                    title: title, body: body, date: date,
                    fileUrl: fileUrl, fileType: fileType,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("Notice Published Successfully!");
                // Clear Form
                document.getElementById('nTitle').value = "";
                document.getElementById('nBody').value = "";
                document.getElementById('fileInput').value = "";
                document.getElementById('fileName').innerText = "Attach File";

            } catch (error) {
                console.error(error);
                alert("Upload Error: " + error.message);
            }
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Publish Notice';
            btn.disabled = false;
        }

        function loadNotices() {
    db.collection('notices').orderBy('timestamp', 'desc').onSnapshot(snap => {
        const list = document.getElementById('noticeListArea');
        list.innerHTML = '';
        snap.forEach(doc => {
            const data = doc.data();
            const attachmentIcon = data.fileType === 'pdf' ? '<i class="fas fa-file-pdf"></i> PDF' : (data.fileType === 'image' ? '<i class="fas fa-image"></i> IMG' : '');
            const attachBadge = data.fileUrl ? `<span class="attachment-badge">${attachmentIcon} Attached</span>` : '';
            list.innerHTML += `
                <div class="notice-item">
                    <div class="n-info"><h4>${data.title}</h4><p>${data.body}</p><div class="n-meta"><span>${data.date}</span> ${attachBadge}</div></div>
                    <button onclick="deleteNotice('${doc.id}')" class="btn-delete"><i class="fas fa-trash"></i></button>
                </div>`;
        });
    });
}

        function deleteNotice(id) {
            if(confirm("Delete this notice?")) {
                db.collection('notices').doc(id).delete();
            }
        }

        // admin-fees.html aur baaki data wale pages ke liye
firebase.auth().onAuthStateChanged((user) => {
    const isLoggedIn = sessionStorage.getItem("isLoggedIn") === "true";
    const userData = JSON.parse(sessionStorage.getItem("userData") || "{}");

    if (user && isLoggedIn && userData.role === 'admin') {
        // Asli test
        db.collection('admins').doc(user.uid).get().then((doc) => {
            if (doc.exists && doc.data().role === 'SuperAdmin') {

                loadNotices(); // <-- Yahan page ka main function call hoga

            } else {
                auth.signOut().then(() => window.location.replace("admin-login.html"));
            }
        });
    } else {
        window.location.replace("admin-login.html");
    }
});

    </script>
</body>
</html>
