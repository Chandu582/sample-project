<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Toppers</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="config.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; padding: 20px; }
        .admin-container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        h2 { color: #1a73e8; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; }

        /* --- LIVE SEARCH PANEL --- */
        .search-panel { 
            background: #fffbeb; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #fcd34d; 
            position: relative;
        }
        .search-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;}

        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; box-sizing: border-box; font-size: 13px; }
        input:focus, select:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 5px rgba(26, 115, 232, 0.3); }

        /* SUGGESTION BOX */
        .suggestion-list {
            background: white; border: 1px solid #ddd; border-radius: 0 0 10px 10px;
            max-height: 300px; overflow-y: auto; position: absolute;
            width: 96%; z-index: 1000; display: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); left: 2%; top: 100%;
        }
        .s-item {
            padding: 10px; border-bottom: 1px solid #eee; cursor: pointer;
            display: flex; align-items: center; gap: 12px; transition: 0.2s;
        }
        .s-item:hover { background: #e3f2fd; }
        .s-item img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }
        .s-info b { display: block; font-size: 14px; color: #333; }
        .s-info span { font-size: 12px; color: #666; }
        .s-id { font-size: 11px; background: #eee; padding: 2px 5px; border-radius: 4px; color: #555; }

        /* FORM LAYOUT */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: #555; font-size: 14px; }

        /* IMAGE PREVIEW */
        .img-preview-box { text-align: center; margin: 15px 0; padding: 15px; border: 2px dashed #ccc; border-radius: 10px; background: #fafafa; }
        #preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid #1a73e8; display: none; margin: 0 auto 10px; }

        /* BUTTONS */
        .save-btn { width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .save-btn:hover { background: #1b5e20; }
        .save-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* LIST */
        .topper-list { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .list-item:hover { background: #f9f9f9; transform: translateX(5px); }
        .del-btn { color: #ff4444; cursor: pointer; background: #ffebee; padding: 8px; border-radius: 50%; }
        .badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #eee; color: #333; margin-left: 5px; font-weight: normal;}
    </style>
</head>
<body>

<div class="admin-container">
    <a href="admin-dashboard.html" style="text-decoration: none; color: #666; font-size: 14px;"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    <h2><i class="fas fa-medal"></i> Manage Toppers</h2>

    <div class="search-panel">
        <h4 style="margin:0 0 10px 0; color:#d97706;"><i class="fas fa-search"></i> Search Student (Filter & Select)</h4>

        <div class="search-row">
            <div style="flex: 2;">
                <input type="text" id="sInput" placeholder="Name (e.g. Rohit) OR ID..." onkeyup="liveSearch()" autocomplete="off">
            </div>

            <div style="flex: 1;">
                <select id="sClass" onchange="liveSearch()">
                    <option value="">Class</option>
                    <option value="10th">10th</option><option value="9th">9th</option>
                    <option value="8th">8th</option><option value="7th">7th</option>
                    <option value="6th">6th</option><option value="5th">5th</option>
                    <option value="4th">4th</option><option value="3rd">3rd</option>
                    <option value="2nd">2nd</option><option value="1st">1st</option>
                    <option value="UKG">UKG</option><option value="LKG">LKG</option>
                    <option value="Nursery">Nursery</option>
                </select>
            </div>

            <div style="flex: 1; max-width: 90px;">
                <select id="sSection" onchange="liveSearch()">
                    <option value="">Sec</option>
                    <option value="A">A</option><option value="B">B</option>
                    <option value="C">C</option><option value="D">D</option>
                </select>
            </div>

            <div style="flex: 1; max-width: 70px;">
                <input type="number" id="sRoll" placeholder="Roll" onkeyup="liveSearch()">
            </div>
        </div>

        <div id="suggestion-box" class="suggestion-list"></div>
    </div>

    <div class="form-group">
        <label>Student Name (Fetched)</label>
        <input type="text" id="tName" placeholder="Name will appear here">
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label>Class</label>
            <input type="text" id="tClass" placeholder="Class">
        </div>
        <div class="form-group">
            <label>Section</label>
            <input type="text" id="tSection" placeholder="Section">
        </div>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label>Roll No</label>
            <input type="text" id="tRoll" placeholder="Roll No">
        </div>
        <div class="form-group">
            <label>Percentage (%)</label>
            <input type="number" id="tPercent" placeholder="Ex: 98.5">
        </div>
    </div>

    <div class="form-group">
        <label>Rank / Title</label>
        <input type="text" id="tRank" placeholder="Ex: 1st Rank or Class Topper">
    </div>

    <div class="img-preview-box">
        <label>Student Photo</label>
        <img id="preview-img" src="" alt="Preview">

        <input type="hidden" id="fetchedPhotoUrl">

        <input type="file" id="tPhotoFile" accept="image/*" onchange="previewFile(event)" style="display:block; margin:auto; width:auto; margin-top:10px;">
        <small style="color: #666; display:block; margin-top:5px;">(Fetched photo will auto-load. Upload new to override.)</small>
    </div>

    <button onclick="saveTopper()" id="saveBtn" class="save-btn">
        <i class="fas fa-save"></i> Publish Topper
    </button>

    <div class="topper-list">
        <h3>Current Toppers List</h3>
        <div id="existing-list">Loading...</div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIGURATION ---

    if (!firebase.apps.length) 

    const cloudName = "dngejhffd"; 
    const uploadPreset = "school_gallery";

    // --- 1. SMART LIVE SEARCH LOGIC ---
    let searchTimeout;

    function liveSearch() {
        const inputVal = document.getElementById('sInput').value.trim();
        const clsInput = document.getElementById('sClass').value;
        const secInput = document.getElementById('sSection').value; // Added Section
        const rollInput = document.getElementById('sRoll').value;
        const box = document.getElementById('suggestion-box');

        // Hide if all empty
        if (!inputVal && !clsInput && !secInput && !rollInput) {
            box.style.display = 'none';
            return;
        }

        // DEBOUNCE (Wait 0.3s)
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            performQuery(inputVal, clsInput, secInput, rollInput, box);
        }, 300);
    }

    // --- 2. OPTIMIZED QUERY (Fixes Index Issues) ---
    function performQuery(text, cls, sec, roll, box) {
        let query = db.collection('students');
        let useClientFiltering = false; // Flag to decide logic

        // LOGIC A: Agar Class select ki hai to pehle sirf Class se data laao (No Index Error)
        if (cls) {
            query = query.where('class', '==', cls);
            useClientFiltering = true; // Baaki filtering hum JS se karenge
        }

        // Agar Section hai to query me jod do (Equality chaining is allowed)
        if (sec) query = query.where('section', '==', sec);

        // Agar Roll hai to query me jod do
        if (roll) query = query.where('roll', '==', roll);

        // LOGIC B: Agar Class select nahi ki hai, par Name type kiya hai
        if (!cls && text) {
             const upperText = text.toUpperCase();
             // STES ID Search
             if (upperText.startsWith('STES')) {
                 query = query.where('stesID', '==', upperText);
             } else {
                 // Name Search (Only works efficiently without Class filter in Firestore)
                 query = query.where('name', '>=', upperText).where('name', '<=', upperText + '\uf8ff');
             }
        }

        // --- EXECUTE QUERY ---
        query.limit(20).get().then(snap => {
            box.innerHTML = '';

            if (snap.empty) {
                box.innerHTML = '<div style="padding:10px; text-align:center; color:#888;">No student found</div>';
                box.style.display = 'block';
                return;
            }

            // --- RENDER RESULTS (With Client Side Filter if needed) ---
            snap.forEach(doc => {
                const data = doc.data();

                // CLIENT SIDE FILTERING: Agar Class select ki thi, to ab Name check karo
                // Ye Firestore ke "Index Required" error ko bypass karta hai
                if (useClientFiltering && text) {
                    const searchStr = text.toUpperCase();
                    const nameMatch = data.name.toUpperCase().includes(searchStr);
                    const idMatch = (data.stesID || "").toUpperCase().includes(searchStr);

                    if (!nameMatch && !idMatch) return; // Skip if name doesn't match
                }

                // Render Item
                const photo = data.photo || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'; 
                const secTxt = data.section ? `(${data.section})` : '';
                const rollTxt = data.roll ? `| Roll: ${data.roll}` : '';
                const idTxt = data.stesID ? `<span class="s-id">${data.stesID}</span>` : '';

                const div = document.createElement('div');
                div.className = 's-item';
                div.onclick = () => selectStudent(data); 
                div.innerHTML = `
                    <img src="${photo}">
                    <div class="s-info">
                        <b>${data.name} ${idTxt}</b>
                        <span>${data.class} ${secTxt} ${rollTxt}</span>
                    </div>
                `;
                box.appendChild(div);
            });

            // Check if client filtering hid all results
            if (box.children.length === 0) {
                 box.innerHTML = '<div style="padding:10px; text-align:center; color:#888;">No matching name in this class</div>';
            }

            box.style.display = 'block';

        }).catch(err => {
            console.log("Search Error:", err);
            box.innerHTML = '<div style="padding:10px; text-align:center; color:red;">Error fetching data</div>';
            box.style.display = 'block';
        });
    }

    // --- 3. SELECT STUDENT ---
    function selectStudent(data) {
        document.getElementById('tName').value = data.name;
        document.getElementById('tClass').value = data.class;
        document.getElementById('tSection').value = data.section || 'A';
        document.getElementById('tRoll').value = data.roll || '';

        // Handle Photo
        const img = document.getElementById('preview-img');
        const hiddenUrl = document.getElementById('fetchedPhotoUrl');

        if(data.photo) {
            img.src = data.photo;
            img.style.display = 'block';
            hiddenUrl.value = data.photo; 
        } else {
            img.style.display = 'none';
            hiddenUrl.value = "";
        }

        document.getElementById('suggestion-box').style.display = 'none';
        document.getElementById('sInput').value = ""; 
    }

    // Close list if clicked outside
    document.addEventListener('click', function(e) {
        if (!document.querySelector('.search-panel').contains(e.target)) {
            document.getElementById('suggestion-box').style.display = 'none';
        }
    });

    // --- 4. PREVIEW NEW PHOTO ---
    function previewFile(event) {
        const file = event.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(){
                document.getElementById('preview-img').src = reader.result;
                document.getElementById('preview-img').style.display = 'block';
                document.getElementById('fetchedPhotoUrl').value = "NEW_FILE_SELECTED"; 
            };
            reader.readAsDataURL(file);
        }
    }

    // --- 5. SAVE TOPPER ---
    async function saveTopper() {
        const name = document.getElementById('tName').value;
        const cls = document.getElementById('tClass').value;
        const sec = document.getElementById('tSection').value;
        const roll = document.getElementById('tRoll').value;
        const percent = document.getElementById('tPercent').value;
        const rank = document.getElementById('tRank').value;

        const fileInput = document.getElementById('tPhotoFile');
        const fetchedUrl = document.getElementById('fetchedPhotoUrl').value;
        const btn = document.getElementById('saveBtn');

        if(!name || !percent || !cls) {
            alert("Please select a student and fill Percentage.");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Publishing...';

        let finalImageUrl = "";

        try {
            if(fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const fd = new FormData();
                fd.append('file', file);
                fd.append('upload_preset', uploadPreset);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, { method: 'POST', body: fd });
                const json = await res.json();
                finalImageUrl = json.secure_url;
            } 
            else if (fetchedUrl && fetchedUrl !== "NEW_FILE_SELECTED") {
                finalImageUrl = fetchedUrl;
            } 
            else {
                finalImageUrl = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png"; 
            }

            await db.collection('school_toppers').add({
                name: name,
                class: cls,
                section: sec,
                rollNo: roll, 
                percentage: percent,
                rank: rank,
                photoUrl: finalImageUrl,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("Topper Added Successfully!");
            location.reload(); 

        } catch(error) {
            console.error(error);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Publish Topper';
            alert("Error: " + error.message);
        }
    }

    // --- 6. LOAD EXISTING TOPPERS ---
    function loadToppers() {
        const listDiv = document.getElementById('existing-list');

        db.collection('school_toppers').orderBy('timestamp', 'desc').get().then((snap) => {
            if(snap.empty) {
                listDiv.innerHTML = "<p style='text-align:center'>No toppers added yet.</p>";
                return;
            }

            listDiv.innerHTML = '';
            snap.forEach(doc => {
                const data = doc.data();
                const sec = data.section ? `(${data.section})` : '';
                const roll = data.rollNo ? `Roll: ${data.rollNo}` : '';

                listDiv.innerHTML += `
                    <div class="list-item">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${data.photoUrl}" style="width:50px; height:50px; border-radius:50%; object-fit:cover; border:2px solid #ddd;">
                            <div>
                                <b>${data.name}</b> 
                                <span class="badge">${data.class} ${sec}</span> 
                                <span style="font-size:11px; color:#666;">${roll}</span><br>
                                <span style="color:#1a73e8; font-weight:bold;">${data.percentage}%</span> - ${data.rank || ''}
                            </div>
                        </div>
                        <i class="fas fa-trash del-btn" onclick="deleteTopper('${doc.id}')"></i>
                    </div>
                `;
            });
        });
    }

    function deleteTopper(id) {
        if(confirm('Remove this topper?')) {
            db.collection('school_toppers').doc(id).delete().then(() => loadToppers());
        }
    }

        // admin-fees.html aur baaki data wale pages ke liye
firebase.auth().onAuthStateChanged((user) => {
    const isLoggedIn = sessionStorage.getItem("isLoggedIn") === "true";
    const userData = JSON.parse(sessionStorage.getItem("userData") || "{}");

    if (user && isLoggedIn && userData.role === 'admin') {
        // Asli test
        db.collection('admins').doc(user.uid).get().then((doc) => {
            if (doc.exists && doc.data().role === 'SuperAdmin') {

                loadToppers(); // <-- Yahan page ka main function call hoga

            } else {
                auth.signOut().then(() => window.location.replace("admin-login.html"));
            }
        });
    } else {
        window.location.replace("admin-login.html");
    }
});

</script>

</body>
</html>
