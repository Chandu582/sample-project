        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; margin: 0; }
        
        /* --- CONTROLS CSS --- */

        .btn { background: #6366f1; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* PRINT CSS (Optimized: Auto-Size + Big Fonts) */

        #printContainer { display: none; }
        
                @media print {
            @page { 
                size: A4; 
                margin: 5mm; /* Thoda margin rakhein taaki printer content na kaate */
            }

            body { 
                background: white; 
                padding: 0; 
                margin: 0; 
                -webkit-print-color-adjust: exact; 
            }

            /* UI Elements Hide karein */
            .controls, .preview-area, .no-print { display: none !important; }
            #printContainer { display: block; }

            /* --- MAIN PAGE CONTAINER --- */
            .a4-page { 
                width: 100%; 
                /* Fixed height hatake min-height use karein taaki overlap na ho */
                height: 280mm; /* A4 (297mm) se thoda kam taaki safe rahe */
                box-sizing: border-box; 
                
                /* PAGE BREAK RULES (Overlap rokne ke liye sabse zaruri) */
                page-break-after: always !important; 
                break-after: page !important;
                page-break-inside: avoid !important;
                
                display: grid; 
                gap: 5mm; /* Bills ke beech ka gap */
                margin-bottom: 0;
            }

            /* Last page ke baad blank page na aaye */
            .a4-page:last-child {
                page-break-after: auto !important;
                break-after: auto !important;
            }
            
            /* --- LAYOUT CONFIG (Rows x Cols) --- */
            .grid-6 { 
                grid-template-columns: 1fr 1fr; 
                grid-template-rows: repeat(3, 1fr); 
            } 
            .grid-9 { 
                grid-template-columns: 1fr 1fr 1fr; 
                grid-template-rows: repeat(3, 1fr); 
            }
            .grid-12 { 
                grid-template-columns: 1fr 1fr 1fr; 
                grid-template-rows: repeat(4, 1fr);

            /* --- BILL CARD --- */

                border: 1px solid #000;

                /* Card ko tutne se bachaye */

                break-inside: avoid;

            /* --- HEADER STYLES --- */
            .b-header { text-align: center; border-bottom: 1px solid #000; padding-bottom: 2px; margin-bottom: 2px; }
            .b-school { font-weight: 900; text-transform: uppercase; color: #000; line-height: 1.1; }
            .b-addr { font-weight: 600; color: #222; margin-top: 1px; }

            /* Info Section */
            .b-info { display: flex; justify-content: space-between; border-bottom: 1px dashed #666; padding-bottom: 2px; margin-bottom: 2px; line-height: 1.2; }
            
            /* Table Section */
            .b-body { flex-grow: 1; display: flex; flex-direction: column; justify-content: start; }
            
            .b-table { width: 100%; border-collapse: collapse; margin-top: 2px; }

            .b-table td { border-bottom: 1px dotted #999; padding: 2px 4px; vertical-align: top; }
            
            /* Total Row */
            .b-total td { border-top: 1px solid #000; font-weight: 800; background: #f0f0f0; -webkit-print-color-adjust: exact; padding: 3px 4px; }

            /* Notes & Footer */
            .b-notes { border: 1px solid #666; padding: 2px 4px; border-radius: 3px; color: #000; margin-top: auto; white-space: pre-wrap; line-height: 1; height: 25px; overflow: hidden; }
            .b-footer { text-align: center; color: #444; margin-top: 2px; border-top: 1px dashed #999; padding-top: 1px; display: flex; justify-content: space-between; font-style: italic; }
            
            /* --- FONT SIZES (Optimized to fit) --- */

            /* 6 BILLS */
            .grid-6 .b-school { font-size: 16px; }

                        /* 12 BILLS (Ultra Compact) - UPDATED */
            .grid-12 .b-school { font-size: 11px; }
            .grid-12 .b-addr { font-size: 8px; }
            
            /* ✅ YE LINE MISSING THI - ISE ADD KIYA HAI */
            .grid-12 .b-contact { font-size: 7px; margin-top: 1px; }

            .grid-12 .b-title { font-size: 7px; padding: 1px 4px; margin-top: 1px; }

            .grid-12 .b-notes { display: none; } /* Jagah kam hoti hai isliye notes hide kar diye */
            .grid-12 .b-footer { font-size: 6px; }
 }

<body>

    <div class="controls no-print">
        <div class="c-head">

        <div class="inp-row">

        <div class="grid-layout">
            <div class="panel-box">

                    <select id="secSelect" class="inp" style="padding:4px;">

            <h3>Generated List</h3>
            <button onclick="printSelected()" class="btn" style="width:auto; margin:0; background:#0f172a;"><i class="fas fa-print"></i> Print Selected</button>
        </div>

                <thead><tr><th width="30"><input type="checkbox" checked onchange="toggleAll(this)"></th><th>Student</th><th>Selected Dues</th><th>Total</th></tr></thead>

    <script>
    
    
    
         // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyA2xmYtteRPlX8sa9p9VRE36dP2cnQnJ8k",
    authDomain: "sample-school-13ca4.firebaseapp.com",
    projectId: "sample-school-13ca4",
    storageBucket: "sample-school-13ca4.firebasestorage.app",
    messagingSenderId: "198448853287",
    appId: "1:198448853287:web:778646f4cb56a9ba7ff902"
  };
    
    
    

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const monthsArr = ["Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec", "Jan", "Feb", "Mar"];
    const classList = ["Nursery", "LKG", "UKG", "1st", "2nd", "3rd", "4th", "5th", "6th", "7th", "8th", "9th", "10th"];
    let currentSession = "2025-2026";
    let calculatedData = [];
    
    // Global Settings Variables
    let globalDueDay = 10;
    let globalFineAmt = 0;

    window.onload = initSystem;

    function saveNotes() { localStorage.setItem('demandBillNotes', document.getElementById('billNotes').value); }

    async function initSystem() {
        currentSession = document.getElementById('sessionSelect').value;
        const savedNote = localStorage.getItem('demandBillNotes');
        if(savedNote) document.getElementById('billNotes').value = savedNote;

        const clsCont = document.getElementById('classContainer');
        clsCont.innerHTML = classList.map(c => 
            `<label class="chk-item"><input type="checkbox" class="cls-chk" value="${c}"> ${c}</label>`
        ).join('');

        await loadHeads();
    }

    async function loadHeads() {
        const container = document.getElementById('headsContainer');
        document.getElementById('statusMsg').innerText = "Loading Config...";
        try {
            // 1. Load Fee Config & General Settings (for Late Fee)
            const [configDoc, generalDoc] = await Promise.all([
                db.collection('masterSettings').doc(`feeConfig_${currentSession}`).get(),
                db.collection('masterSettings').doc('general').get()
            ]);

            // Set Late Fee Rules
            if(generalDoc.exists) {
                const rules = generalDoc.data().lateFeeRule || {};
                globalDueDay = Number(rules.dueDay) || 10;
                globalFineAmt = Number(rules.fineAmount) || 0;
            }

            // 2. Build Dynamic Head List
            let heads = configDoc.exists ? (configDoc.data().heads || []) : [];
            let unique = new Set();
            let list = [];

            // Add Standard Heads from Config
            heads.forEach(h => { 
                if(!unique.has(h.name)) { unique.add(h.name); list.push(h); } 
            });

            // Add Default System Heads (if not in config)
            ['Tuition Fee', 'Transport Fee', 'Late Fee', 'Previous Dues'].forEach(n => {
                if(!unique.has(n)) { unique.add(n); list.push({name:n, type:'MONTHLY'}); }
            });

            // 3. Render Checkboxes
            container.innerHTML = list.map(h => 
                `<label class="chk-item"><input type="checkbox" class="head-chk" value="${h.name}" checked> ${h.name}</label>`
            ).join('');
            
            document.getElementById('statusMsg').innerText = "Ready";
        } catch(e) { console.error(e); }
    }

    function toggleHeads(src) { document.querySelectorAll('.head-chk').forEach(c => c.checked = src.checked); }
    function toggleAll(src) { document.querySelectorAll('.stu-chk').forEach(c => c.checked = src.checked); }

                
                
        // --- 🟢 PASTE THIS UPDATED FUNCTION IN admin-print-demand-bill.html 🟢 ---

async function calculateDues() {
    const selectedClasses = Array.from(document.querySelectorAll('.cls-chk:checked')).map(c => c.value);
    const selectedHeads = Array.from(document.querySelectorAll('.head-chk:checked')).map(c => c.value);
    const sec = document.getElementById('secSelect').value;
    const btn = document.querySelector('.btn');

    if (selectedClasses.length === 0) return alert("Select at least one Class!");
    if (selectedHeads.length === 0) return alert("Select Fee Heads!");

    btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Processing...`;

    try {
        calculatedData = [];

        // --- DATE LOGIC (Updated to Match Admin-Fees Logic) ---
        const dateObj = new Date();
        // April = 0, ..., March = 11 logic for array index
        const todayIdx = (dateObj.getMonth() >= 3) ? dateObj.getMonth() - 3 : dateObj.getMonth() + 9;
        const currentDay = dateObj.getDate();

        let allStudents = [];
        let clsFeesMap = {};

        // Fetch Data
        const [feesSnap, transSnap, configDoc, generalDoc] = await Promise.all([
            db.collection('fees').where('session', '==', currentSession).get(),
            db.collection('transportStructure').where('session', '==', currentSession).get(),
            db.collection('masterSettings').doc(`feeConfig_${currentSession}`).get(),
            db.collection('masterSettings').doc('general').get()
        ]);

        // Late Fee Rules
        let localDueDay = 10;
        let localFineAmt = 0;
        if (generalDoc.exists) {
            const rules = generalDoc.data().lateFeeRule || {};
            localDueDay = Number(rules.dueDay) || 10;
            localFineAmt = Number(rules.fineAmount) || 0;
        }

        const allFees = feesSnap.docs.map(d => d.data());

        let transMap = {};
        transSnap.forEach(d => {
            if (d.data().routeName) {
                const rName = d.data().routeName;
                const rRate = Number(d.data().rate) || 0;
                transMap[rName] = rRate;
                transMap[rName.toLowerCase()] = rRate; // Case insensitive map
                if (rName.includes('_')) {
                    const shortName = rName.split('_')[1].trim();
                    transMap[shortName] = rRate;
                    transMap[shortName.toLowerCase()] = rRate;
                }
            }
        });

        const configHeads = configDoc.exists ? (configDoc.data().heads || []) : [];

                for (const cls of selectedClasses) {
            const [sSnap, fSnap] = await Promise.all([
                db.collection('students').where('status', '!=', 'Trash').where('class', '==', cls).get(),
                db.collection('feeStructure').doc(`${currentSession}_${cls}`).get()
            ]);
            
            // 🟢 NAYA LOGIC: Sirf 'Active' students ko hi list mein add karein
            sSnap.forEach(d => {
                const studentData = d.data();
                if (studentData.status === 'Active') {
                    allStudents.push({ id: d.id, ...studentData });
                }
            });
            
            clsFeesMap[cls] = fSnap.exists ? fSnap.data() : {};
        }


        // --- MAIN LOOP ---
        allStudents.forEach(s => {
            if (sec && s.section !== sec) return;

            const myFees = allFees.filter(f => f.sid === s.id);
            const clsFees = clsFeesMap[s.class] || {};
            let myDues = [];
            let grandTotal = 0;

            const stuCat = (s.admissionCategory || 'Regular').toUpperCase();

            // ✅ FIX 1: IMPROVED ADMISSION DATE LOGIC
            let startIdx = 0;
            if (s.admissionDate) {
                try {
                    const sessStartYear = parseInt(currentSession.split('-')[0]); // e.g. 2025
                    const admDate = new Date(s.admissionDate);
                    
                    if (!isNaN(admDate.getTime())) {
                        const admYear = admDate.getFullYear();
                        const admMonth = admDate.getMonth(); // 0=Jan, 11=Dec

                        if (admYear < sessStartYear) {
                            startIdx = 0; // Old student
                        } else if (admYear === sessStartYear) {
                            // Apr(3) -> 0, May(4) -> 1... Dec(11) -> 8
                            startIdx = (admMonth >= 3) ? admMonth - 3 : 0;
                        } else if (admYear > sessStartYear) {
                            // Jan(0) -> 9, Feb(1) -> 10, Mar(2) -> 11
                            startIdx = (admMonth <= 2) ? admMonth + 9 : 12;
                        }
                    }
                } catch (e) { console.log("Date Parse Error", e); }
            }

            // Unpaid Month Tracking for Late Fee
            let unpaidMonthSet = new Set();
            let isTuitionApplicableForCategory = true;

            // --- 1. CALCULATE STANDARD FEES ---
            selectedHeads.forEach(headName => {
                let hNameLower = headName.toLowerCase();
                if (hNameLower.includes('late fee')) return; // Calculated at end

                // Category Check
                let hConf = configHeads.find(h => h.name === headName);
                if (hConf && hConf.appTo) {
                    const allowedCats = hConf.appTo.map(c => c.toUpperCase());
                    if (allowedCats.length > 0 && !allowedCats.includes(stuCat)) {
                        if (hNameLower.includes('tuition')) isTuitionApplicableForCategory = false;
                        return; // Skip this head
                    }
                }

                // Previous Dues Logic
                if (headName === 'Previous Dues') {
                    let prev = 0;
                    if (s[`dues_${currentSession}`] !== undefined) prev = Number(s[`dues_${currentSession}`]);
                    else if (currentSession === "2025-2026") prev = Number(s.previousDue) || 0;

                    const prevPaid = myFees.filter(f => f.headName === 'Previous Dues' || f.description === 'Previous Dues')
                        .reduce((acc, curr) => acc + (Number(curr.paidAmount) || 0) + (Number(curr.discountUsed) || 0), 0);
                    let prevRem = Math.max(0, prev - prevPaid);
                    if (prevRem > 0) {
                        myDues.push({ label: "Previous Dues", amt: prevRem });
                        grandTotal += prevRem;
                    }
                    return;
                }

                // Transport Logic
                if (hNameLower.includes('transport')) {
                    if (s.transportOpted) {
                        const cleanName = s.transportRoute?.replace(/^\d{4}-\d{4}_/, '') || "";
                        // Fuzzy Rate Lookup
                        const r = transMap[s.transportRoute] || transMap[cleanName] || transMap[s.transportRoute?.toLowerCase()] || 0;
                        const alloc = s.transportMonths || [];

                        // Total Transport Paid
                        const tPaid = myFees.filter(f => f.type === 'TRANSPORT' || (f.headName || "").toLowerCase().includes('transport'))
                            .reduce((acc, f) => acc + (Number(f.paidAmount) || 0) + (Number(f.discountUsed) || 0), 0);

                        let rolling = tPaid;
                        let dAmt = 0; let dMonths = [];

                        monthsArr.forEach((m, i) => {
                            if (i > todayIdx) return;
                            const fullM = { "Apr": "April", "May": "May", "Jun": "June", "Jul": "July", "Aug": "August", "Sep": "September", "Oct": "October", "Nov": "November", "Dec": "December", "Jan": "January", "Feb": "February", "Mar": "March" }[m];

                            // Logic: User Opted Month AND Admission Month Check
                            if ((alloc.includes(m) || alloc.includes(fullM)) && i >= startIdx) {
                                let paidThis = (rolling >= r) ? r : rolling;
                                rolling = Math.max(0, rolling - r);
                                let pending = r - paidThis;
                                if (pending > 0) {
                                    dMonths.push(m); dAmt += pending;
                                    unpaidMonthSet.add(m);
                                }
                            }
                        });
                        if (dAmt > 0) { myDues.push({ label: `Transport (${dMonths.join(',')})`, amt: dAmt }); grandTotal += dAmt; }
                    }
                    return;
                }

                // Monthly Fees (Tuition & Others)
                let isMonthly = (hNameLower.includes('tuition'));
                if (hConf && hConf.type === 'MONTHLY') isMonthly = true;

                // ✅ FIX 2: SMART FEE HEAD LOOKUP (Case insensitive)
                let targetFeeData = clsFees[headName]; // Direct match
                if (!targetFeeData) {
                    // Try case insensitive search
                    const matchingKey = Object.keys(clsFees).find(k => k.toLowerCase() === hNameLower);
                    if (matchingKey) targetFeeData = clsFees[matchingKey];
                    // Special Case for Tuition (Tuition Fee vs Tuition Fees)
                    else if (hNameLower.includes('tuition')) {
                        const tKey = Object.keys(clsFees).find(k => k.toLowerCase().includes('tuition'));
                        if (tKey) targetFeeData = clsFees[tKey];
                    }
                }

                if (isMonthly) {
                    let rateObj = {};
                    if (targetFeeData && typeof targetFeeData === 'object') rateObj = targetFeeData;
                    else if (targetFeeData) monthsArr.forEach(m => rateObj[m] = Number(targetFeeData?.Amount) || Number(targetFeeData) || 0);

                    const paidHist = myFees.filter(f => {
                        const dbName = (f.headName || f.otherHead || "").toLowerCase();
                        return dbName === hNameLower || dbName.startsWith(hNameLower + " (") || 
                               (hNameLower.includes('tuition') && (f.type === 'TUITION' || f.type === 'PAYMENT' || dbName.includes('tuition')));
                    });
                    let rolling = paidHist.reduce((acc, f) => acc + (Number(f.paidAmount) || 0) + (Number(f.discountUsed) || 0), 0);

                    let dAmt = 0; let dMonths = [];
                    monthsArr.forEach((m, i) => {
                        if (i > todayIdx) return;
                        let r = Number(rateObj[m]) || 0;
                        
                        // Check Admission Date
                        if (r > 0 && i >= startIdx) {
                            let paidThis = (rolling >= r) ? r : rolling;
                            rolling = Math.max(0, rolling - r);
                            let pending = r - paidThis;
                            if (pending > 0) {
                                dMonths.push(m); dAmt += pending;
                                unpaidMonthSet.add(m);
                            }
                        }
                    });

                    if (dAmt > 0) {
                        let l = headName;
                        if (l.length > 12) l = l.substring(0, 12) + "..";
                        myDues.push({ label: `${l} (${dMonths.join(',')})`, amt: dAmt });
                        grandTotal += dAmt;
                    }
                } else {
                    // Annual Fee
                    let validFrom = hConf && hConf.validFrom ? hConf.validFrom : 'Apr';
                    const monthMapIdx = { "Apr": 0, "May": 1, "Jun": 2, "Jul": 3, "Aug": 4, "Sep": 5, "Oct": 6, "Nov": 7, "Dec": 8, "Jan": 9, "Feb": 10, "Mar": 11 };
                    const validIdx = monthMapIdx[validFrom] || 0;

                    // Admission Date Check for Annual
                    if (todayIdx >= validIdx && startIdx <= validIdx) {
                        let exp = Number(targetFeeData?.Amount || targetFeeData || 0);
                        let paid = myFees.filter(f => (f.headName || "").toLowerCase() === hNameLower).reduce((acc, f) => acc + (Number(f.paidAmount) || 0) + (Number(f.discountUsed) || 0), 0);
                        let d = Math.max(0, exp - paid);
                        if (d > 0) {
                            myDues.push({ label: headName, amt: d });
                            grandTotal += d;
                        }
                    }
                }
            });

            // --- 2. CALCULATE LATE FEE ---
            if (isTuitionApplicableForCategory && selectedHeads.some(h => h.toLowerCase().includes('late fee'))) {
                let lateFeeDue = 0;
                let lateMonths = [];

                monthsArr.forEach((m, i) => {
                    if (i < startIdx || i > todayIdx) return;
                    if (!unpaidMonthSet.has(m)) return; // Only if month is unpaid

                    let isLate = false;
                    if (i < todayIdx) {
                        isLate = true;
                    } else if (i === todayIdx) {
                        if (currentDay > localDueDay) isLate = true;
                    }

                    if (isLate) {
                        lateFeeDue += localFineAmt;
                        lateMonths.push(m);
                    }
                });

                if (lateFeeDue > 0) {
                    let label = "Late Fee";
                    if (lateMonths.length > 0) label += ` (${lateMonths.join(', ')})`;
                    myDues.push({ label: label, amt: lateFeeDue });
                    grandTotal += lateFeeDue;
                }
            }

            // --- 3. UDHAAR / CREDIT ---
            if (s.pendingItems && Array.isArray(s.pendingItems) && s.pendingItems.length > 0) {
                let creditTotal = 0;
                let itemNames = [];
                s.pendingItems.forEach(item => {
                    let p = Number(item.price) || 0;
                    creditTotal += p;
                    itemNames.push(item.name);
                });
                if (creditTotal > 0) {
                    let label = `Udhaar (${itemNames.join(', ')})`;
                    if (label.length > 25) label = label.substring(0, 25) + "..";
                    myDues.push({ label: label, amt: creditTotal });
                    grandTotal += creditTotal;
                }
            }

            if (grandTotal > 0) {
                s.finalDues = myDues;
                s.finalTotal = grandTotal;
                calculatedData.push(s);
            }
        });

        // Sorting (Class > Section > Roll)
        calculatedData.sort((a, b) => {
            if (a.class !== b.class) return a.class.localeCompare(b.class);
            if (a.section !== b.section) return (a.section || "").localeCompare(b.section || "");
            return (Number(a.roll) || 0) - (Number(b.roll) || 0);
        });

        let html = calculatedData.map(s => {
            let det = s.finalDues.map(d => `${d.label}: ${d.amt}`).join(' | ');
            return `
                <tr>
                    <td><input type="checkbox" class="stu-chk" value="${s.id}" checked></td>
                    <td><b>${s.name}</b> <span style="font-size:11px; color:#666;">(${s.class}-${s.section || 'A'} | Roll:${s.roll || '-'})</span></td>
                    <td style="font-size:11px; color:#555;">${det}</td>
                    <td><span class="badge">₹${s.finalTotal}</span></td>
                </tr>
            `;
        }).join('');

        document.getElementById('listBody').innerHTML = html || `<tr><td colspan="4" style="text-align:center; padding:20px;">No Dues Found.</td></tr>`;
        document.getElementById('previewArea').style.display = 'block';
        btn.innerHTML = `<i class="fas fa-search"></i> Calculate & Preview`;

    } catch (e) {
        console.error(e);
        alert("Error: " + e.message);
        btn.innerHTML = "Error";
    }
}
     
                
                
                
                
                
                


    function printSelected() {

        const layout = parseInt(document.getElementById('layoutSelect').value);

        container.innerHTML = "";

        const studentsToPrint = calculatedData.filter(s => chks.includes(s.id));
        
        for (let i = 0; i < studentsToPrint.length; i += layout) {
