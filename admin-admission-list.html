<!DOCTYPE html>
<html lang="en">
<head>
  

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission List - Admin</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .top-bar { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .dash-btn { background: #1a73e8; color: white; padding: 12px; border-radius: 8px; border: none; cursor: pointer; flex: 1; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .dash-btn:hover { background: #1557b0; }
        .excel-btn { background: #107c41; }
        .excel-btn:hover { background: #0a5c30; }

        .table-container { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; color: #555; text-transform: uppercase; font-size: 12px; }
        
        .student-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #eee; cursor: pointer; }
        
        .badge { padding: 5px 10px; border-radius: 5px; font-size: 11px; font-weight: 600; }
        .status-Pending { background: #fff3cd; color: #856404; }
        .status-Approved { background: #d4edda; color: #155724; }
        .status-Rejected { background: #f8d7da; color: #721c24; }

        .btn-action { padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; color: white; transition: 0.2s; margin-right: 3px; }
        .btn-approve { background: #16a34a; } .btn-approve:hover { background: #15803d; }
        .btn-reject { background: #f59e0b; } .btn-reject:hover { background: #d97706; }
        .btn-delete { background: #ef4444; } .btn-delete:hover { background: #dc2626; }
        
        /* Disabled button style */
        .btn-action:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(100%); }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="admin-dashboard.html" class="dash-btn"><i class="fas fa-th-large"></i> Dashboard</a>
        <button onclick="exportToExcel()" class="dash-btn excel-btn"><i class="fas fa-file-excel"></i> Excel Report</button>
    </div>

    <div style="background:white; padding:20px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0;">Admission Requests</h2>
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Search Name, ID..." style="padding:10px; border:1px solid #ccc; border-radius:5px; width:250px;">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Photo</th>
                    <th>ID / Date</th>
                    <th>Student Info</th>
                    <th>Parent Info</th>
                    <th>Address</th>
                    <th>Status</th>
                    <th style="text-align: center;">Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

        <script>
        const firebaseConfig = {
  apiKey: "AIzaSyA2xmYtteRPlX8sa9p9VRE36dP2cnQnJ8k",
  authDomain: "sample-school-13ca4.firebaseapp.com",
  projectId: "sample-school-13ca4",
  storageBucket: "sample-school-13ca4.firebasestorage.app",
  messagingSenderId: "198448853287",
  appId: "1:198448853287:web:778646f4cb56a9ba7ff902"
};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let rawAdmissions = []; 

        // LOAD DATA
            // 🟢 SECURE INITIALIZATION 🟢
        // 🟢 NAYA SECURE INITIALIZATION (Firestore Database cross-check ke sath) 🟢
    firebase.auth().onAuthStateChanged((user) => {
        const isLoggedIn = sessionStorage.getItem("isLoggedIn") === "true";
        const userData = JSON.parse(sessionStorage.getItem("userData") || "{}");

        if (user && isLoggedIn && userData.role === 'admin') {
            // Asli test: Kya ye UID admins collection mein hai?
            db.collection('admins').doc(user.uid).get().then((doc) => {
                if (doc.exists && doc.data().role === 'SuperAdmin') {
                    
                    // 👉 ADMIN VERIFIED! Ab aapka original data load karne ka code chalega
                    db.collection('admissions').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
                        const tbody = document.getElementById('tableBody');
                        tbody.innerHTML = '';
                        rawAdmissions = [];
                        
                        snapshot.forEach(doc => {
                            const data = doc.data();
                            const id = doc.id;
                            
                            const sName = data.name || data.studentName || 'N/A';
                            const sFather = data.fatherName || data.father || 'N/A';
                            const sPhone = data.mobile || data.parentPhone || 'N/A';
                            const sClass = data.admissionClass || data.class || 'N/A';
                            const sAppId = data.appId || 'N/A';
                            const sAddress = data.addressPerm || data.address || 'N/A';
                            const photo = data.photoUrl || data.photo || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
                            const status = data.status || "Pending";
                            const date = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleDateString() : 'N/A';
                            
                            const linkedId = data.linkedStudentDocId || null;

                            rawAdmissions.push({ "ID": sAppId, "Date": date, "Name": sName, "Class": sClass, "Father": sFather, "Mobile": sPhone, "Status": status });

                            const dataStr = JSON.stringify(data).replace(/'/g, "&apos;").replace(/"/g, "&quot;");

                            tbody.innerHTML += `
                                <tr>
                                    <td><img src="${photo}" class="student-img" onclick="window.open('${photo}')"></td>
                                    <td><b style="color:#1a73e8;">${sAppId}</b><br><small>${date}</small></td>
                                    <td><b>${sName}</b><br><small>Class: ${sClass}</small></td>
                                    <td>F: ${sFather}<br><i class="fas fa-phone"></i> ${sPhone}</td>
                                    <td style="font-size:12px; max-width:150px;">${sAddress}</td>
                                    <td><span class="badge status-${status}">${status}</span></td>
                                    <td style="text-align: center;">
                                        <div style="display:flex; justify-content:center;">
                                            <button onclick='handleApprove("${id}", ${dataStr})' class="btn-action btn-approve" title="Approve" ${status === 'Approved' ? 'disabled' : ''}><i class="fas fa-check"></i></button>
                                            <button onclick='handleReject("${id}", "${linkedId}")' class="btn-action btn-reject" title="Reject & Remove Student" ${status === 'Rejected' ? 'disabled' : ''}><i class="fas fa-ban"></i></button>
                                            <button onclick="deleteReq('${id}')" class="btn-action btn-delete" title="Delete Only Request"><i class="fas fa-trash"></i></button>
                                        </div>
                                    </td>
                                </tr>
                            `;
                        });
                    });
                    
                } else {
                    // Agar login kiya hua hai par database mein admin nahi hai, toh bahar nikalo
                    firebase.auth().signOut().then(() => window.location.replace("admin-login.html"));
                }
            }).catch((error) => {
                console.error("Error verifying admin:", error);
                firebase.auth().signOut().then(() => window.location.replace("admin-login.html"));
            });
        } else {
            console.warn("Unauthorized access! Redirecting...");
            window.location.replace("admin-login.html");
        }
    });



        // 1. APPROVE LOGIC
        async function handleApprove(docId, data) {
            if(!confirm(`Confirm Admission for ${data.name || data.studentName}?`)) return;

            try {
                const studentData = {
                    stesID: data.appId || "STES"+Date.now(),
                    admissionDate: new Date().toISOString().split('T')[0],
                    studentType: "New Student",
                    status: "Active",
                    name: (data.name || data.studentName).toUpperCase(),
                    gender: data.gender, dob: data.dob, religion: data.religion || "Hinduism", category: data.category || "General",
                    class: data.admissionClass || data.class, section: "A", 
                    fatherName: data.fatherName || data.father, motherName: data.motherName || data.mother,
                    mobile: data.mobile || data.parentPhone, addressPerm: data.addressPerm || data.address,
                    transportOpted: data.transportOpted || false, photo: data.photoUrl || data.photo,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                const studentRef = await db.collection('students').add(studentData);
                
                // Link ID save kar rahe hain
                await db.collection('admissions').doc(docId).update({ 
                    status: 'Approved',
                    linkedStudentDocId: studentRef.id 
                });

                const msg = `*Admission Approved!*\nWelcome ${studentData.name} to St. Teresa School.`;
                window.open(`https://wa.me/91${studentData.mobile}?text=${encodeURIComponent(msg)}`, '_blank');

            } catch (e) { alert("Error: " + e.message); }
        }

        // 2. REJECT LOGIC (Ye Student List se DELETE karega)
        async function handleReject(admissionDocId, linkedStudentId) {
            if(!confirm("REJECT this admission?\n\n⚠️ NOTE: If the student was in the Main List, they will be DELETED.")) return;

            try {
                // Agar Student List me tha, to wahan se delete karo
                if (linkedStudentId && linkedStudentId !== "undefined" && linkedStudentId !== "null") {
                    await db.collection('students').doc(linkedStudentId).delete();
                }

                // Admission ka status badal do
                await db.collection('admissions').doc(admissionDocId).update({ 
                    status: 'Rejected',
                    linkedStudentDocId: firebase.firestore.FieldValue.delete() 
                });

                alert("Application Rejected & Student Removed from Main List.");
            } catch (e) { alert("Error: " + e.message); }
        }

        // 3. DELETE LOGIC (Ye Student List ko DELETE NAHI karega)
        async function deleteReq(admissionDocId) {
            // Sirf Admission request delete hogi
            if(!confirm("Delete this request history permanently?\n(Student data in Main List will remain SAFE)")) return;
            
            // Hum sirf 'admissions' collection se delete kar rahe hain
            await db.collection('admissions').doc(admissionDocId).delete();
        }

        function exportToExcel() { /* Same as before */ 
            if (rawAdmissions.length === 0) return alert("No data!");
            const ws = XLSX.utils.json_to_sheet(rawAdmissions);
            const wb = XLSX.utils.book_new();
            ws['!cols'] = Object.keys(rawAdmissions[0]).map(k => ({wch: 20}));
            XLSX.utils.book_append_sheet(wb, ws, "Admissions");
            XLSX.writeFile(wb, "Admission_List.xlsx");
        }

        function filterTable() { /* Same as before */
            let input = document.getElementById("searchInput").value.toUpperCase();
            document.querySelectorAll("#tableBody tr").forEach(row => {
                row.style.display = row.innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
            });
        }
    </script>

</body>
</html>
