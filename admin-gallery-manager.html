<!DOCTYPE html>
<html lang="en">
<head>
    


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STES Master Media Gallery</title>
    
    

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #1a73e8; --success: #16a34a; --danger: #d32f2f; --bg: #f8f9fa; --card-bg: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; }

        /* UI Enhancements */
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .header h2 { margin: 0; color: var(--primary); font-weight: 700; display: flex; align-items: center; gap: 12px; }
        .back-btn { text-decoration: none; color: #555; font-weight: 600; background: #f1f3f4; padding: 8px 15px; border-radius: 10px; transition: 0.3s; }
        .back-btn:hover { background: #e8eaed; }

        /* Modern Upload Section */
        .upload-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border: 2.5px dashed var(--primary); text-align: center; margin-bottom: 30px; }
        .upload-inputs { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 20px; align-items: center; }
        
        input[type="text"], select { padding: 12px 15px; border: 1.5px solid #eee; border-radius: 12px; outline: none; width: 200px; font-family: inherit; transition: 0.3s; }
        input[type="text"]:focus, select:focus { border-color: var(--primary); }

        .file-label { background: #e8f0fe; color: var(--primary); padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 10px; }
        .btn-upload { background: var(--primary); color: white; border: none; padding: 12px 35px; border-radius: 12px; cursor: pointer; font-weight: 700; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3); transition: 0.3s; }
        .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(26, 115, 232, 0.4); }
        .btn-upload:disabled { background: #bcc1c6; cursor: not-allowed; transform: none; }

        /* Dynamic Filter Bar */
        .filters { margin-bottom: 25px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .filter-btn { border: 1.5px solid #ddd; background: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 600; color: #666; transition: 0.3s; }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .filter-btn:hover:not(.active) { background: #f1f3f4; }

        /* Media Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 18px; }
        .media-card { position: relative; height: 180px; border-radius: 15px; overflow: hidden; background: #eee; cursor: pointer; transition: 0.4s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 3px solid transparent; }
        .media-card:hover { transform: scale(1.04) translateY(-5px); z-index: 2; }
        
        /* NEW: Selection Style */
        .media-card.selected { border-color: var(--primary); box-shadow: 0 0 15px rgba(26, 115, 232, 0.4); }
        .select-checkbox { position: absolute; top: 10px; left: 10px; width: 20px; height: 20px; z-index: 15; accent-color: var(--primary); cursor: pointer; }

        .media-card img, .media-card video { width: 100%; height: 100%; object-fit: cover; }
        
        .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 35px; opacity: 0.8; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .media-tag { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.6); color: white; padding: 3px 10px; border-radius: 15px; font-size: 10px; font-weight: 600; }
        
        .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(211, 47, 47, 0.9); color: white; width: 32px; height: 32px; border-radius: 50%; border: none; cursor: pointer; opacity: 0; transition: 0.3s; z-index: 10; }
        .media-card:hover .delete-btn { opacity: 1; }

        /* Bulk Delete Bar */
        .bulk-action-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 12px 25px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; align-items: center; gap: 20px; z-index: 1000; border: 1px solid #eee; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); justify-content: center; align-items: center; flex-direction: column; }
        #modalMediaContainer { max-width: 90%; max-height: 80vh; display: flex; justify-content: center; }
        #modalMediaContainer img, #modalMediaContainer video { max-width: 100%; max-height: 80vh; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .modal-btns { margin-top: 20px; display: flex; gap: 20px; }
        .m-btn { padding: 12px 30px; border-radius: 30px; border: none; cursor: pointer; font-weight: 700; font-size: 14px; }
        .m-close { background: white; color: #333; }
        .m-del { background: var(--danger); color: white; }

        #uploadStatus { margin-top: 15px; font-size: 14px; color: var(--primary); font-weight: 700; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><i class="fas fa-photo-video"></i> Media Manager</h2>
        <a href="admin-dashboard.html" class="back-btn"><i class="fas fa-home"></i> Dashboard</a>
    </div>

    <div class="upload-card">
        <i class="fas fa-cloud-upload-alt" style="font-size: 45px; color: var(--primary); margin-bottom: 15px;"></i>
        <h3 style="margin:0;">Bulk Media Uploader</h3>
        <p style="color:#777; font-size:13px; margin-top:5px;">Select multiple photos or videos to add to gallery</p>

        <div class="upload-inputs">
            <select id="mediaType" onchange="toggleMediaUI()">
                <option value="image">Media: Photos</option>
                <option value="video">Media: Videos</option>
            </select>

            <label class="file-label">
                <i class="fas fa-folder-plus"></i> Select Files
                <input type="file" id="fileInput" accept="image/*" multiple onchange="updateFileCount()">
            </label>
            <span id="fileStatus" style="font-size:12px; color:#666; font-weight:600;">No files picked</span>

            <input type="text" id="mediaTitle" placeholder="Event Title (Optional)">
            
            <select id="catSelect">
                <option value="General">Category: General</option>
                <option value="Events">Category: Events</option>
                <option value="Sports">Category: Sports</option>
                <option value="Classroom">Category: Classroom</option>
            </select>

            <button onclick="processUpload()" class="btn-upload" id="upBtn">Upload Now</button>
        </div>
        <div id="uploadStatus"></div>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterMedia('All', this)">All</button>
        <button class="filter-btn" onclick="filterMedia('General', this)">General</button>
        <button class="filter-btn" onclick="filterMedia('Events', this)">Events</button>
        <button class="filter-btn" onclick="filterMedia('Sports', this)">Sports</button>
        <button class="filter-btn" onclick="filterMedia('Classroom', this)">Classroom</button>
        <button class="filter-btn" style="color: #1a73e8; border-color: #1a73e8;" onclick="filterMedia('video', this)">
            <i class="fas fa-video"></i> Videos
        </button>
    </div>

    <div class="gallery-grid" id="galleryContainer">
        <p style="grid-column:1/-1; text-align:center;">Loading gallery assets... <i class="fas fa-spinner fa-spin"></i></p>
    </div>
</div>

<div id="bulkActionBar" class="bulk-action-bar">
    <span id="selectedCount" style="font-weight: 700; color: #444;">0 Selected</span>
    <button onclick="deleteSelectedAssets()" class="btn-upload" style="background: var(--danger); padding: 8px 20px; font-size: 13px;">
        <i class="fas fa-trash"></i> Delete Selected
    </button>
    <button onclick="clearSelection()" class="back-btn" style="font-size: 13px; padding: 8px 15px;">Cancel</button>
</div>

<div id="mediaModal" class="modal">
    <div id="modalMediaContainer"></div>
    <div class="modal-btns">
        <button onclick="closeModal()" class="m-btn m-close">Close Preview</button>
        <button onclick="deleteCurrentAsset()" class="m-btn m-del"><i class="fas fa-trash"></i> Delete Permanent</button>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
  apiKey: "AIzaSyA2xmYtteRPlX8sa9p9VRE36dP2cnQnJ8k",
  authDomain: "sample-school-13ca4.firebaseapp.com",
  projectId: "sample-school-13ca4",
  storageBucket: "sample-school-13ca4.firebasestorage.app",
  messagingSenderId: "198448853287",
  appId: "1:198448853287:web:778646f4cb56a9ba7ff902"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const cloudName = "dngejhffd", uploadPreset = "school_gallery"; 

    let fullGallery = [];
    let deleteId = null;
    let selectedIds = []; // Track selected items

    // 1. AUTO-HIDE CATEGORY LOGIC
    function toggleMediaUI() {
        const type = document.getElementById('mediaType').value;
        const fileInput = document.getElementById('fileInput');
        const catSelect = document.getElementById('catSelect');
        fileInput.accept = type === 'image' ? "image/*" : "video/*";
        catSelect.style.display = (type === 'video') ? 'none' : 'inline-block';
    }

    function updateFileCount() {
        const input = document.getElementById('fileInput');
        const status = document.getElementById('fileStatus');
        status.innerText = input.files.length > 0 ? `${input.files.length} Files Selected` : "No files picked";
    }

    // 2. SMART UPLOAD
    async function processUpload() {
        const input = document.getElementById('fileInput');
        const files = input.files;
        const type = document.getElementById('mediaType').value; 
        const title = document.getElementById('mediaTitle').value.trim() || "School Media";
        const cat = (type === 'video') ? 'Video' : document.getElementById('catSelect').value;
        const btn = document.getElementById('upBtn');
        const statusDiv = document.getElementById('uploadStatus');

        if(files.length === 0) return alert("Please select files first!");

        for(let i = 0; i < files.length; i++) {
            const fType = files[i].type;
            if (type === 'image' && !fType.includes('image')) return alert(`Error: "${files[i].name}" is a video!`);
            if (type === 'video' && !fType.includes('video')) return alert(`Error: "${files[i].name}" is a photo!`);
        }

        btn.disabled = true;
        statusDiv.style.display = 'block';

        for(let i = 0; i < files.length; i++) {
            statusDiv.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Uploading ${i + 1} of ${files.length}...`;
            try {
                const formData = new FormData();
                formData.append('file', files[i]);
                formData.append('upload_preset', uploadPreset);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/${type}/upload`, { method: 'POST', body: formData });
                const cloudData = await res.json();
                await db.collection('gallery').add({
                    imageUrl: cloudData.secure_url,
                    title: title,
                    category: cat,
                    type: type, 
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch(e) { console.error(e); }
        }
        alert("Media Gallery Updated Successfully! 🎉");
        location.reload();
    }

    // 3. FETCH & RENDER (MODIFIED FOR SELECTION)
    // 3. FETCH & RENDER (MODIFIED FOR SELECTION)
function loadGallery() {
    db.collection('gallery').orderBy('createdAt', 'desc').onSnapshot(snap => {
        fullGallery = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        displayMedia(fullGallery);
    });
}


    function displayMedia(data) {
        const container = document.getElementById('galleryContainer');
        container.innerHTML = '';
        data.forEach(item => {
            const isVid = item.type === 'video';
            const isSelected = selectedIds.includes(item.id);
            const card = `
                <div class="media-card ${isSelected ? 'selected' : ''}" id="card-${item.id}" onclick="handleCardClick(event, '${item.imageUrl}', '${item.id}', '${item.type}')">
                    <input type="checkbox" class="select-checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleSelect('${item.id}')">
                    ${isVid ? `<video src="${item.imageUrl}"></video><i class="fas fa-play-circle play-overlay"></i>` : `<img src="${item.imageUrl}" loading="lazy">`}
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteAsset('${item.id}')"><i class="fas fa-trash-alt"></i></button>
                    <div class="media-tag">${item.category}</div>
                </div>`;
            container.innerHTML += card;
        });
        if(data.length === 0) container.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#999;">No media found.</p>';
        updateBulkBar();
    }

    // --- SELECTION LOGIC ---
    function handleCardClick(event, url, id, type) {
        // If some items are already selected, clicking a card toggles selection
        if (selectedIds.length > 0) {
            toggleSelect(id);
        } else {
            // Otherwise open normal preview modal
            openMediaModal(url, id, type);
        }
    }

    function toggleSelect(id) {
        const index = selectedIds.indexOf(id);
        if (index > -1) {
            selectedIds.splice(index, 1);
            document.getElementById(`card-${id}`).classList.remove('selected');
        } else {
            selectedIds.push(id);
            document.getElementById(`card-${id}`).classList.add('selected');
        }
        
        // Sync checkbox state
        const cb = document.querySelector(`#card-${id} .select-checkbox`);
        if(cb) cb.checked = selectedIds.includes(id);
        
        updateBulkBar();
    }

    function updateBulkBar() {
        const bar = document.getElementById('bulkActionBar');
        const countText = document.getElementById('selectedCount');
        if (selectedIds.length > 0) {
            bar.style.display = 'flex';
            countText.innerText = `${selectedIds.length} Media Selected`;
        } else {
            bar.style.display = 'none';
        }
    }

    function clearSelection() {
        selectedIds = [];
        displayMedia(fullGallery);
    }

    async function deleteSelectedAssets() {
        if(!confirm(`Delete ${selectedIds.length} items permanently?`)) return;
        const btn = document.querySelector('#bulkActionBar .btn-upload');
        btn.disabled = true;
        btn.innerText = "Deleting...";

        for(let id of selectedIds) {
            await db.collection('gallery').doc(id).delete();
        }
        
        alert("Bulk delete finished! 🗑️");
        selectedIds = [];
        updateBulkBar();
    }

    // --- ORIGINAL LOGIC ---
    function filterMedia(filter, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(filter === 'All') displayMedia(fullGallery);
        else if(filter === 'video') displayMedia(fullGallery.filter(m => m.type === 'video'));
        else displayMedia(fullGallery.filter(m => m.category === filter));
    }

    function openMediaModal(url, id, type) {
        const viewer = document.getElementById('modalMediaContainer');
        viewer.innerHTML = (type === 'video') ? `<video src="${url}" controls autoplay></video>` : `<img src="${url}">`;
        document.getElementById('mediaModal').style.display = 'flex';
        deleteId = id;
    }

    function closeModal() {
        document.getElementById('mediaModal').style.display = 'none';
        document.getElementById('modalMediaContainer').innerHTML = '';
    }

    function deleteAsset(id) {
        if(confirm("Permanently delete this from gallery?")) db.collection('gallery').doc(id).delete();
    }

    function deleteCurrentAsset() {
        if(deleteId) { deleteAsset(deleteId); closeModal(); }
    }
    
    
    
        // admin-fees.html aur baaki data wale pages ke liye
firebase.auth().onAuthStateChanged((user) => {
    const isLoggedIn = sessionStorage.getItem("isLoggedIn") === "true";
    const userData = JSON.parse(sessionStorage.getItem("userData") || "{}");

    if (user && isLoggedIn && userData.role === 'admin') {
        // Asli test
        db.collection('admins').doc(user.uid).get().then((doc) => {
            if (doc.exists && doc.data().role === 'SuperAdmin') {
                
                loadGallery(); // <-- Yahan page ka main function call hoga
                
            } else {
                auth.signOut().then(() => window.location.replace("admin-login.html"));
            }
        });
    } else {
        window.location.replace("admin-login.html");
    }
});

    
    
    
</script>
</body>
</html>
