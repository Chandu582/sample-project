    <div id="itemModal" class="modal">
        <div class="modal-card" style="max-width: 500px; height: auto; max-height: 80vh;">
            <div class="m-head" style="background:#a855f7;">
                <div style="font-weight:700; font-size:16px;">EXTRA ITEMS HISTORY</div>
                <button onclick="document.getElementById('itemModal').style.display='none'"
                    style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">&times;</button>

                <div id="itemListArea" style="padding:15px;"></div>

    <script>
        // FIREBASE CONFIGURATION

        let currentSession = "";
        let rawData = [];
        let dynamicHeads = [];

        // ✅ YE DO LINE ADD KAREIN (Data store karne ke liye)
        let globalFeeMap = {};
        let globalTransMap = {};

        // Ledger Standard Months (Short Names)
        const monthsArr = ["Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec", "Jan", "Feb", "Mar"];

        function parseDate(raw, locale) {
            locale = locale || 'en-IN';
            if (!raw) return "-";
            try {
                if (raw && raw.seconds) return new Date(raw.seconds * 1000).toLocaleDateString(locale);
                if (typeof raw === "string") {
                    // DD/MM/YYYY — format stored by toLocaleDateString('en-IN')
                    var m = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
                    if (m) {
                        var d = new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
                        if (!isNaN(d.getTime())) return d.toLocaleDateString(locale);
                    }
                    var d2 = new Date(raw);
                    if (!isNaN(d2.getTime())) return d2.toLocaleDateString(locale);
                    return raw;
                }
            } catch (e) { }
            return "-";
        }

        async function init() {
            await loadSessions();
            loadData();
        }

        async function loadSessions() {
            try {
                const doc = await db.collection('masterSettings').doc('sessions').get();
                const sel = document.getElementById('sessionSelect');

                if (doc.exists && doc.data().list && doc.data().list.length > 0) {
                    // Sort array in descending order to get the latest session first (e.g., 2026-2027 then 2025-2026)
                    const list = doc.data().list.sort().reverse();
                    sel.innerHTML = list.map(s => `<option value="${s}">${s}</option>`).join('');

                    currentSession = list[0]; // Automatically set to latest
                    sel.value = currentSession;
                } else {
                    // Fallback: Agar database mein koi session nahi hai, to auto-create karega
                    const today = new Date();
                    const y = today.getMonth() < 3 ? today.getFullYear() - 1 : today.getFullYear();
                    const autoSession = `${y}-${y + 1}`;

                    sel.innerHTML = `<option value="${autoSession}">${autoSession}</option>`;
                    currentSession = autoSession;

                    // Database mein save bhi kar dega
                    db.collection('masterSettings').doc('sessions').set({ list: [autoSession] }, { merge: true });
                }
            } catch (e) {
                console.error("Session Load Error:", e);
            }
        }

        async function loadData() {
            currentSession = document.getElementById('sessionSelect').value;
            document.getElementById('sessionDisplay').innerText = "Session: " + currentSession;

            // --- UI SKELETONS INJECTION ---
            const skeletonRows = `
                <tr class="sk-table-row" style="display: table-row;">
                    <td class="stu-cell">
                        <div style="display:flex; flex-direction:column; gap:6px;">
                            <div class="skeleton sk-text" style="width: 120px; height:16px;"></div>
                            <div class="skeleton sk-text" style="width: 60px; height:12px;"></div>
                        </div>
                    </td>
                    <td style="padding:15px;"><div class="skeleton sk-text" style="width:50px;"></div></td>
                    <td style="padding:15px;"><div class="skeleton sk-text" style="width:50px;"></div></td>
                    <td style="padding:15px;"><div class="skeleton sk-text" style="width:50px;"></div></td>
                    <td style="padding:15px;"><div class="skeleton sk-text" style="width:50px;"></div></td>
                    <td style="padding:15px;"><div class="skeleton sk-text" style="width:50px;"></div></td>
                    <td style="padding:15px;"><div class="skeleton sk-text" style="width:50px;"></div></td>
                    <td style="padding:15px;"><div class="skeleton sk-text" style="width:50px;"></div></td>
                    <td style="padding:15px;"><div class="skeleton sk-text" style="width:50px;"></div></td>
                    <td style="padding:15px;"><div class="skeleton sk-text" style="width:70px;"></div></td>
                    <td style="padding:15px;"><div class="skeleton sk-text" style="width:50px; margin:auto;"></div></td>
                </tr>
            `.repeat(8);
            document.getElementById('tableBody').innerHTML = skeletonRows;
            // ------------------------------

            try {
                const [stds, fees, structs, config, trans, generalSettings] = await Promise.all([
                    db.collection('students').where('status', '==', 'Active').get(),
                    db.collection('fees').where('session', '==', currentSession).get(),
                    db.collection('feeStructure').where('session', '==', currentSession).get(),
                    db.collection('masterSettings').doc(`feeConfig_${currentSession}`).get(),
                    db.collection('transportStructure').where('session', '==', currentSession).get(),
                    db.collection('masterSettings').doc('general').get()
                ]);

                const lateRule = generalSettings.exists ? (generalSettings.data().lateFeeRule || {}) : {};
                const globalDueDay = Number(lateRule.dueDay) || 0;
                const globalFineAmt = Number(lateRule.fineAmount) || 0;

                let rawHeads = config.exists ? (config.data().heads || []) : [];
                if (!rawHeads.some(h => h.name.toLowerCase().includes('tuition'))) rawHeads.push({ name: 'Tuition Fee', type: 'MONTHLY', appTo: ['REGULAR'] });
                if (!rawHeads.some(h => h.name.toLowerCase().includes('transport'))) rawHeads.push({ name: 'Transport Fee', type: 'MONTHLY', appTo: ['REGULAR'] });

                const priority = ["tuition", "transport", "generator", "development", "exam"];
                dynamicHeads = rawHeads.sort((a, b) => {
                    let aName = a.name.toLowerCase(), bName = b.name.toLowerCase();
                    let aIdx = priority.findIndex(p => aName.includes(p));
                    let bIdx = priority.findIndex(p => bName.includes(p));
                    if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
                    if (aIdx !== -1) return -1;
                    if (bIdx !== -1) return 1;
                    return aName.localeCompare(bName);
                });

                globalFeeMap = {}; structs.forEach(d => {
                    let cName = d.data().className;
                    if (!cName && d.id.includes('_')) cName = d.id.split('_')[1];
                    if (cName) globalFeeMap[cName] = d.data();
                });

                globalTransMap = {};
                trans.forEach(d => {
                    const val = Number(d.data().rate) || 0;
                    if (d.data().routeName) {
                        globalTransMap[d.data().routeName] = val;
                        if (d.data().routeName.includes('_')) globalTransMap[d.data().routeName.split('_')[1].trim()] = val;
                    }
                });

                let feesByStudent = {};
                fees.forEach(d => {
                    const f = d.data();
                    if (!feesByStudent[f.sid]) feesByStudent[f.sid] = [];
                    feesByStudent[f.sid].push(f);
                });

                const monthsArr = ["Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec", "Jan", "Feb", "Mar"];
                const fullMonths = ['April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December', 'January', 'February', 'March'];
                const monthMapIdx = { "Apr": 0, "May": 1, "Jun": 2, "Jul": 3, "Aug": 4, "Sep": 5, "Oct": 6, "Nov": 7, "Dec": 8, "Jan": 9, "Feb": 10, "Mar": 11 };
                const todayIdx = (new Date().getMonth() >= 3) ? new Date().getMonth() - 3 : new Date().getMonth() + 9;
                const currentDay = new Date().getDate();

                // 6. PROCESS STUDENTS (MAIN LOGIC)
                rawData = stds.docs.map(doc => {
                    let sData = doc.data();

                    // ✅ 1. SESSION VISIBILITY CHECK (Agar bacha is session me active nahi hai to hatao)
                    if (sData.activeSessions && Array.isArray(sData.activeSessions)) {
                        if (!sData.activeSessions.includes(currentSession)) return null;
                    } else {
                        if (currentSession !== "2025-2026") return null;
                    }

                    let s = { id: doc.id, ...sData };

                    // ✅ 2. SESSION META OVERRIDE (Pichle session ki class, roll no aur status uthayega)
                    if (s[`sessionMeta_${currentSession}`]) {
                        s.class = s[`sessionMeta_${currentSession}`].class || s.class;
                        s.section = s[`sessionMeta_${currentSession}`].section || s.section;
                        s.roll = s[`sessionMeta_${currentSession}`].roll || s.roll;
                        s.status = s[`sessionMeta_${currentSession}`].status || s.status;
                    }

                    const myFees = feesByStudent[s.id] || [];
                    const clsFees = globalFeeMap[s.class] || {}; // Ab ye nayi overriden class ka fee structure dhundhega


                    // --- 1. WALLET & CREDIT CALCULATION (NEW) ---
                    const walletBalance = Number(s.walletBalance) || 0;

                    let creditDue = 0;
                    const creditItems = s.pendingItems || [];
                    creditItems.forEach(item => {
                        creditDue += (Number(item.amount) || 0);
                    });

                    // --- Admission Logic ---
                    let startIdx = 0;
                    if (s.admissionDate) {
                        try {
                            const sessStartYear = parseInt(currentSession.split('-')[0]);
                            const admDate = new Date(s.admissionDate);
                            if (!isNaN(admDate.getTime())) {
                                const admYear = admDate.getFullYear();
                                const admMonth = admDate.getMonth();
                                if (admYear < sessStartYear) startIdx = 0;
                                else if (admYear === sessStartYear) startIdx = (admMonth >= 3) ? admMonth - 3 : 0;
                                else if (admYear > sessStartYear) startIdx = (admMonth <= 2) ? admMonth + 9 : 12;
                            }
                        } catch (err) { }
                    }

                    let headsData = {};
                    let currentDues = 0;
                    let totalPaid = 0;
                    const stuCat = (s.admissionCategory || 'REGULAR').toUpperCase();

                    dynamicHeads.forEach(h => {
                        let exp = 0, paid = 0;
                        let hNameLower = h.name.toLowerCase();

                        // Category Check
                        let isApplicable = true;
                        if (h.appTo && Array.isArray(h.appTo)) {
                            const allowed = h.appTo.map(c => c.toUpperCase());
                            if (!allowed.includes(stuCat)) isApplicable = false;
                        }

                        if (isApplicable) {
                            if (hNameLower.includes('transport')) {
                                if (s.transportOpted) {
                                    let routeName = s.transportRoute || "";
                                    if (routeName.includes('_')) routeName = routeName.split('_')[1].trim();
                                    const rate = globalTransMap[s.transportRoute] || globalTransMap[routeName] || 0;
                                    const allowedMonths = s.transportMonths || [];
                                    let count = 0;
                                    monthsArr.forEach((m, i) => {
                                        if (i < startIdx) return;
                                        if ((allowedMonths.includes(m) || allowedMonths.includes(fullMonths[i])) && i <= todayIdx) count++;
                                    });
                                    exp = rate * count;
                                }
                            }
                            else if (h.type === 'MONTHLY') {
                                if (clsFees[h.name] && typeof clsFees[h.name] === 'object' && clsFees[h.name]['Apr']) {
                                    monthsArr.forEach((m, i) => {
                                        if (i <= todayIdx && i >= startIdx) exp += (Number(clsFees[h.name][m]) || 0);
                                    });
                                } else {
                                    let amt = Number(clsFees[h.name]?.Amount || 0);
                                    if (amt > 0) {
                                        let activeMonths = (todayIdx + 1) - startIdx;
                                        if (activeMonths < 0) activeMonths = 0;
                                        exp = amt * activeMonths;
                                    }
                                }
                            }
                            else {
                                const validFrom = h.validFrom || 'Apr';
                                const validIdx = monthMapIdx[validFrom];
                                const isTimeReached = (todayIdx >= validIdx);
                                const isEligibleByDate = (startIdx <= validIdx);
                                if (isTimeReached && isEligibleByDate) exp = Number(clsFees[h.name]?.Amount || 0);
                            }
                        }

                        myFees.forEach(f => {
                            let fHead = (f.headName || f.otherHead || "").toLowerCase();
                            let fType = f.type;
                            let match = false;

                            if (fHead === hNameLower) match = true;
                            if (fType === 'TUITION' && hNameLower.includes('tuition')) match = true;
                            if (fType === 'PAYMENT' && hNameLower.includes('tuition')) match = true;
                            if (fType === 'TRANSPORT' && hNameLower.includes('transport')) match = true;
                            if ((fType === 'HEAD' || fType === 'HEADONLY') && fHead.includes(hNameLower)) match = true;

                            if (match) {
                                // FIXED: Add BOTH to satisfy the individual Head's due clearance internally
                                paid += (Number(f.paidAmount) || 0) + (Number(f.discountUsed) || 0);
                            }
                        });

                        let due = Math.max(0, exp - paid);
                        headsData[h.name] = { exp, paid, due, isApplicable };
                        currentDues += due;
                    });

                    let extraPaid = 0; let itemHistory = [];
                    let totalLatePaid = 0; let lateHistory = [];
                    let totalDisc = 0; let discHistory = [];
                    let actualCashPaid = 0;

                    let rhMap = {};
                    myFees.forEach(f => {
                        let rNo = f.receiptNo || ("N/A-" + Math.random());
                        if (!rhMap[rNo]) rhMap[rNo] = { cash: 0, itemDisc: 0, explicitDisc: 0 };

                        let fHead = (f.headName || f.otherHead || "").toLowerCase();

                        if (f.type === 'ITEM') {
                            extraPaid += (Number(f.paidAmount) || 0);
                            itemHistory.push(f);
                            rhMap[rNo].cash += (Number(f.paidAmount) || 0);
                        }
                        else if (f.type === 'LATE' || fHead === 'late fee') {
                            totalLatePaid += (Number(f.paidAmount) || 0);
                            lateHistory.push(f);
                            rhMap[rNo].cash += (Number(f.paidAmount) || 0);
                        }
                        else if (f.type === 'DISCOUNT' || fHead === 'discount' || fHead === 'concession') {
                            rhMap[rNo].explicitDisc += (Number(f.paidAmount) || 0);

                            // To avoid double-pushing into discHistory if a document already exists for this receipt
                            if (Number(f.paidAmount) > 0) {
                                const existIdx = discHistory.findIndex(x => x.receiptNo === rNo);
                                if (existIdx === -1) {
                                    discHistory.push(f);
                                } else {
                                    discHistory[existIdx].paidAmount = Number(discHistory[existIdx].paidAmount) + Number(f.paidAmount);
                                }
                            }
                        }
                        else {
                            let cashVal = Number(f.paidAmount) || 0;
                            // Discount logic updated to not double-count if explicit DISCOUNT doc exists
                            let discVal = (Number(f.discountUsed) || 0) + (Number(f.discount) || 0);
                            rhMap[rNo].cash += cashVal;
                            rhMap[rNo].itemDisc += discVal;

                            if (discVal > 0 && f.discount && Number(f.discount) > 0) {
                                // Push legacy discount if we haven't already captured an explicit one
                                const existIdx = discHistory.findIndex(x => x.receiptNo === rNo);
                                if (existIdx === -1) {
                                    discHistory.push({ ...f, headName: 'Concession', paidAmount: Number(f.discount) });
                                }
                            }
                        }
                    });

                    Object.values(rhMap).forEach(g => {
                        actualCashPaid += g.cash;
                        totalDisc += Math.max(g.itemDisc, g.explicitDisc);
                    });

                    totalPaid = actualCashPaid;

                    // Auto Late Fee Calc (FIXED: Ledger Logic)
                    // Auto Late Fee Calc (FIXED: Ledger 650 Issue)
                    let totalFineGenerated = 0;
                    if (globalDueDay > 0 && globalFineAmt > 0) {
                        const tKey = Object.keys(headsData).find(k => k.toLowerCase().includes('tuition')) || "Tuition Fee";

                        if (tKey && headsData[tKey] && headsData[tKey].isApplicable) {
                            let rollingPaid = headsData[tKey].paid || 0;

                            monthsArr.forEach((m, i) => {
                                if (i < startIdx || i > todayIdx) return;

                                let mFee = 0;
                                if (clsFees[tKey] && typeof clsFees[tKey] === 'object' && clsFees[tKey]['Apr']) {
                                    mFee = Number(clsFees[tKey][m]) || 0;
                                } else {
                                    mFee = Number(clsFees[tKey]?.Amount || 0);
                                }

                                if (mFee > 0) {
                                    if (rollingPaid >= mFee) {
                                        rollingPaid -= mFee; // Paid on time
                                    } else {
                                        rollingPaid = 0; // Pending month found
                                        let isLate = false;
                                        if (i < todayIdx) isLate = true;
                                        else if (i === todayIdx && currentDay > globalDueDay) isLate = true;

                                        if (isLate) totalFineGenerated += globalFineAmt;
                                    }
                                }
                            });
                        }
                    }

                    // 🟢 FIX: Calculate properly by subtracting already paid late fees
                    let lateFeeDue = Math.max(0, totalFineGenerated - totalLatePaid);
                    let calcLateFeeExp = Math.max(totalLatePaid, totalFineGenerated);

                    let prevDue = 0;
                    const sessionDueKey = `dues_${currentSession}`;
                    if (s[sessionDueKey] !== undefined) prevDue = Number(s[sessionDueKey]);
                    else if (currentSession === "2025-2026") prevDue = Number(s.previousDue) || 0;

                    let finalGrandTotal = (currentDues + prevDue + lateFeeDue);

                    return {
                        ...s, headsData, prevDue, currentDues,
                        grandTotalDue: finalGrandTotal,
                        totalPaid, history: myFees,
                        extraPaid, itemHistory,
                        totalLate: totalLatePaid, lateFeeExp: calcLateFeeExp, lateFeeDue: lateFeeDue, lateHistory,
                        totalDisc, discHistory,
                        walletBalance, creditDue, creditItems // <--- New Fields Added
                    };
                }).filter(s => s !== null); // ✅ HIDDEN STUDENTS KO REMOVE KARO

                buildHeader();
                renderTable();

            } catch (e) { console.error(e); alert("Error loading data: " + e.message); }
        }

        function buildHeader() {
            const tr = document.getElementById('tableHeadRow');
            // Sticky First Column (Name)
            let html = `<th class="stu-cell" style="text-align:left; padding-left:10px;">Student Detail</th>`;

            // Dynamic Fee Heads
            dynamicHeads.forEach(h => {
                html += `<th>${h.name} (Exp)</th><th>Paid</th><th>Due</th>`;
            });

            // New Columns: Wallet & Credit
            html += `
                <th style="background:#eff6ff; color:#1e40af;">Discount</th>
                <th style="background:#fee2e2;">Late Exp</th>
                <th style="background:#fee2e2;">Late Paid</th>
                <th style="background:#fee2e2;">Late Due</th>
                <th style="background:#f3e8ff;">Extra Items</th>

                <th style="background:#e0f2fe; color:#0369a1;">Wallet</th>
                <th style="background:#ffedd5; color:#c2410c;">Credit (Udhaar)</th>

                <th>Current Due</th>
                <th>Prev Due</th>
                <th>Grand Total</th>
                <th>Status</th>
            `;
            tr.innerHTML = html;
        }

        // --- UI RENDER FUNCTIONS ---

        function renderTable() {
            const fName = document.getElementById('fName').value.toLowerCase();
            const fClass = document.getElementById('fClass').value;
            const fStatus = document.getElementById('fStatus').value;
            const tbody = document.getElementById('tableBody');

            tbody.innerHTML = "";

            const filtered = rawData.filter(s => {
                const matchName = s.name.toLowerCase().includes(fName) || String(s.stesID).toLowerCase().includes(fName);
                const matchClass = fClass === "" || s.class === fClass;
                const matchStatus = fStatus === "All" || (fStatus === "Pending" && s.grandTotalDue > 0) || (fStatus === "Clear" && s.grandTotalDue <= 0);
                return matchName && matchClass && matchStatus;
            });

            if (!filtered.length) { tbody.innerHTML = `<tr><td colspan="50" style="text-align:center; padding:20px;">No records found</td></tr>`; return; }

            const html = filtered.map(s => {
                // Category Badge Logic
                const cat = s.admissionCategory || 'Regular';
                let badgeStyle = "background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe;";
                if (cat === 'Hostler') badgeStyle = "background:#f3e8ff; color:#6b21a8; border:1px solid #d8b4fe;";
                else if (cat === 'RTE') badgeStyle = "background:#fff7ed; color:#c2410c; border:1px solid #fed7aa;";
                else if (cat === 'Freeship') badgeStyle = "background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0;";

                let cells = "";
                dynamicHeads.forEach(h => {
                    const d = s.headsData[h.name] || { exp: 0, paid: 0, due: 0 };
                    let bgStyle = "";
                    if (h.name.toLowerCase().includes('transport')) bgStyle = "background:#f0fdf4;";
                    if (h.name.toLowerCase().includes('tuition')) bgStyle = "background:#eff6ff;";

                    cells += `
                        <td onclick="event.stopPropagation(); openHistoryModal('${s.id}', 'HEAD', '${h.name}')" style="${bgStyle} border-left:2px solid #e2e8f0; cursor:pointer;">₹${d.exp}</td>
                        <td onclick="event.stopPropagation(); openHistoryModal('${s.id}', 'HEAD', '${h.name}')" style="${bgStyle} color:#059669; cursor:pointer;">₹${d.paid}</td>
                        <td onclick="event.stopPropagation(); openHistoryModal('${s.id}', 'HEAD', '${h.name}')" style="${bgStyle} font-weight:700; color:${d.due > 0 ? '#dc2626' : '#cbd5e1'}; cursor:pointer;">₹${d.due}</td>
                    `;
                });

                // Other Columns + NEW WALLET & CREDIT CELLS
                let otherCells = `
                    <td onclick="event.stopPropagation(); openHistoryModal('${s.id}', 'DISCOUNT')" style="background:#ecfccb; color:#3f6212; font-weight:700; cursor:pointer; text-decoration:underline;">- ₹${s.totalDisc}</td>
                    <td style="background:#fee2e2; color:#7f1d1d;">₹${s.lateFeeExp}</td>
                    <td onclick="event.stopPropagation(); openHistoryModal('${s.id}', 'LATE')" style="background:#fee2e2; color:#166534; font-weight:700; cursor:pointer; text-decoration:underline;">₹${s.totalLate}</td>
                    <td style="background:#fee2e2; color:#b91c1c; font-weight:800;">₹${s.lateFeeDue}</td>
                    <td onclick="event.stopPropagation(); openHistoryModal('${s.id}', 'ITEM')" style="background:#f3e8ff; color:#6b21a8; font-weight:700; cursor:pointer; text-decoration:underline;">₹${s.extraPaid}</td>

                    ${otherCells}
                    <td style="font-weight:700;">₹${s.currentDues}</td>

        // --- SEARCH LAG FIX (DEBOUNCING) ---
        let searchTimeout;

        function handleSearch() {
            // Purana timer clear karein
            clearTimeout(searchTimeout);

            // Naya timer set karein (300ms ka wait)
            searchTimeout = setTimeout(() => {
                renderTable();
            }, 300);
        }

        // --- POPUP FUNCTIONS ---

        // ✅ GENERIC HISTORY MODAL (Items, Late Fee, Discount)

        // --- NEW STUDENT DASHBOARD MODAL (Matches Screenshot) ---
        // --- UPDATED STUDENT DASHBOARD (With History List) ---

        function openModal(sid) {
            const s = rawData.find(x => x.id === sid);
            if (!s) return;

            const mBody = document.querySelector('#stuModal .m-body');

            // --- 1. SETUP CONSTANTS ---
            const monthsArr = ["Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec", "Jan", "Feb", "Mar"];
            const fullMonths = ['April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December', 'January', 'February', 'March'];
            const todayIdx = (new Date().getMonth() >= 3) ? new Date().getMonth() - 3 : new Date().getMonth() + 9;

            // --- 2. ADMISSION DATE LOGIC ---
            let startIdx = 0;
            if (s.admissionDate) {
                try {
                    const sessStartYear = parseInt(currentSession.split('-')[0]);
                    const admDate = new Date(s.admissionDate);
                    if (!isNaN(admDate.getTime())) {
                        const admYear = admDate.getFullYear();
                        const admMonth = admDate.getMonth();
                        if (admYear < sessStartYear) startIdx = 0;
                        else if (admYear === sessStartYear) startIdx = (admMonth >= 3) ? admMonth - 3 : 0;
                        else if (admYear > sessStartYear) startIdx = (admMonth <= 2) ? admMonth + 9 : 12;
                    }
                } catch (err) { }
            }

            // --- 3. TUITION GRID GENERATION ---
            const clsFees = globalFeeMap[s.class] || {};

            // Find Tuition Head Name (from Structure)
            let tuitionHeadName = Object.keys(clsFees).find(k => k.toLowerCase().includes('tuition') || k.toLowerCase().includes('tution'));

            // --- SMART CATEGORY CHECK (Matches Admin-Fees Logic) ---
            const stuCat = (s.admissionCategory || 'REGULAR').toUpperCase();
            let isTuitionApplicable = true;

            if (window.dynamicHeads) {
                // 1. Find the Rule for Tuition
                let tRule = window.dynamicHeads.find(h => h.name === tuitionHeadName);
                if (!tRule) tRule = window.dynamicHeads.find(h => h.name.toLowerCase().includes('tuition'));

                // 2. Determine Allowed Categories
                // Default to ['REGULAR'] if appTo is missing (Ye wahi logic hai jo Collection page me hai)
                let allowed = ['REGULAR'];

                if (tRule && tRule.appTo && Array.isArray(tRule.appTo) && tRule.appTo.length > 0) {
                    allowed = tRule.appTo.map(c => c.toUpperCase());
                }

                // 3. Apply Restriction
                if (!allowed.includes(stuCat)) {
                    isTuitionApplicable = false;
                }
            }

            let monthlyRate = 0;
            if (isTuitionApplicable && tuitionHeadName && clsFees[tuitionHeadName]) {
                monthlyRate = Number(clsFees[tuitionHeadName]['Apr'] || clsFees[tuitionHeadName] || clsFees[tuitionHeadName].Amount || 0);
            }

            // Generate HTML for Grid OR Not Applicable Message
            let monthGridHtml = "";

            if (!isTuitionApplicable) {
                // 🟢 HIDE BOXES: Show Message Instead
                monthGridHtml = `
                    <div style="font-size:11px; font-weight:700; color:#475569; margin-bottom:5px;">TUITION FEE STATUS</div>
                    <div style="padding:15px; background:#f8fafc; border:1px dashed #cbd5e1; border-radius:8px; text-align:center; color:#64748b; font-size:12px; margin-bottom:20px;">
                        <i class="fas fa-ban" style="color:#ef4444; margin-bottom:5px;"></i><br>
                        Tuition Fee is <b>Not Applicable</b> for <span style="font-weight:bold; color:#0f172a;">${stuCat}</span> category.
                    </div>
                `;
            } else {
                // Calculate Paid Logic
                let totalTuitionPaid = 0;
                if (s.history) {
                    s.history.forEach(h => {
                        const type = (h.type || "").toUpperCase();
                        const name = (h.headName || h.otherHead || "").toLowerCase();
                        const amt = Number(h.paidAmount) || 0;
                        const disc = Number(h.discountUsed) || 0; // Discount bhi jodo

                        let match = false;
                        if (name === (tuitionHeadName || "").toLowerCase()) match = true;
                        if (type === 'TUITION') match = true;
                        if (type === 'PAYMENT' && name.includes('tuition')) match = true;

                        if (match) totalTuitionPaid += (amt + disc);
                    });
                }

                let rollingPaid = totalTuitionPaid;
                monthGridHtml = '<div style="font-size:11px; font-weight:700; color:#475569; margin-bottom:5px;">TUITION FEE STATUS</div><div class="d-month-grid">';

                monthsArr.forEach((m, i) => {
                    let statusClass = "paid";
                    let btnStyle = "";
                    let content = m;
                    let cellRate = monthlyRate;

                    if (i < startIdx) { statusClass = "na"; cellRate = 0; }
                    else if (monthlyRate <= 0) { statusClass = "na"; content += "?"; cellRate = 0; }
                    else if (i > todayIdx) { statusClass = ""; }

                    if (cellRate > 0) {
                        let paidForThis = 0;
                        if (rollingPaid >= cellRate) { paidForThis = cellRate; rollingPaid -= cellRate; }
                        else { paidForThis = rollingPaid; rollingPaid = 0; }

                        let rem = cellRate - paidForThis;

                        if (rem <= 0) statusClass = "clear";
                        else if (paidForThis > 0) {
                            statusClass = "partial";
                            let pct = Math.round((paidForThis / cellRate) * 100);
                            btnStyle = `background: linear-gradient(90deg, #fde017 ${pct}%, #fee2e2 ${pct}%);`;
                            content = `${m} <span style='font-size:8px; display:block;'>${pct}%</span>`;
                        } else {
                            if (i <= todayIdx) statusClass = "paid";
                            else statusClass = "";
                        }
                    }
                    monthGridHtml += `<div class="d-m-btn ${statusClass}" style="${btnStyle}">${content}</div>`;
                });
                monthGridHtml += '</div>';
            }

            // --- 4. TRANSPORT GRID GENERATION ---
            let transGridHtml = "";
            if (s.transportOpted) {
                let routeName = s.transportRoute || "";
                if (routeName.includes('_')) routeName = routeName.split('_')[1].trim();
                const transRate = globalTransMap[s.transportRoute] || globalTransMap[routeName] || 0;

                let totalTransPaid = 0;
                if (s.history) {
                    s.history.forEach(h => {
                        const type = (h.type || "").toUpperCase();
                        const name = (h.headName || h.otherHead || "").toLowerCase();
                        if (type === 'TRANSPORT' || name.includes('transport')) {
                            totalTransPaid += (Number(h.paidAmount) || 0) + (Number(h.discountUsed) || 0);
                        }
                    });
                }

                let tRolling = totalTransPaid;
                const allowedMonths = s.transportMonths || [];

                transGridHtml = '<div style="font-size:11px; font-weight:700; color:#475569; margin:10px 0 5px 0;">TRANSPORT STATUS</div><div class="d-month-grid">';

                monthsArr.forEach((m, i) => {
                    let statusClass = "paid";
                    let btnStyle = "";
                    let effectiveRate = transRate;

                    if (i < startIdx) { statusClass = "na"; effectiveRate = 0; }
                    else if (!allowedMonths.includes(m) && !allowedMonths.includes(fullMonths[i])) {
                        statusClass = "na"; effectiveRate = 0;
                    }
                    else if (i > todayIdx) { statusClass = ""; }

                    if (effectiveRate > 0) {
                        let paidForThis = 0;
                        if (tRolling >= effectiveRate) { paidForThis = effectiveRate; tRolling -= effectiveRate; }
                        else { paidForThis = tRolling; tRolling = 0; }

                        let rem = effectiveRate - paidForThis;

                        if (rem <= 0) statusClass = "clear";
                        else if (paidForThis > 0) {
                            statusClass = "partial";
                            let pct = Math.round((paidForThis / effectiveRate) * 100);
                            btnStyle = `background: linear-gradient(90deg, #fde017 ${pct}%, #fee2e2 ${pct}%);`;
                        } else {
                            if (i <= todayIdx) statusClass = "paid";
                            else statusClass = "";
                        }
                    }
                    transGridHtml += `<div class="d-m-btn ${statusClass}" style="${btnStyle}">${m}</div>`;
                });
                transGridHtml += '</div>';
            }

            // --- 5. HISTORY TABLE ---
            let historyHtml = '';
            let modalTotalAmount = 0;
            let modalTotalDiscount = 0;
            let modalTotalPaid = 0;

            if (!s.history || s.history.length === 0) {
                historyHtml = `<div style="padding:15px; color:#94a3b8; font-size:12px; text-align:center;">No payments found.</div>`;
            } else {
                historyHtml = `<div style="max-height:200px; overflow-y:auto; border:1px solid #e2e8f0; border-radius:10px; margin-bottom:15px; background:white;">
                    <table style="width:100%; border-collapse:collapse; font-size:11px; text-align:left;">
                        <thead style="position:sticky; top:0; background:#f1f5f9; color:#475569; font-weight:700; z-index:10;">
                            <tr>
                                <th style="padding:8px; border-bottom:1px solid #e2e8f0;">Date / Receipt</th>
                                <th style="padding:8px; border-bottom:1px solid #e2e8f0;">Description</th>
                                <th style="padding:8px; text-align:right; border-bottom:1px solid #e2e8f0;">Total</th>
                                <th style="padding:8px; text-align:right; border-bottom:1px solid #e2e8f0;">Dis.</th>
                                <th style="padding:8px; text-align:right; border-bottom:1px solid #e2e8f0;">Paid</th>
                            </tr>
                        </thead>
                        <tbody>`;

                // Group by Receipt logic identical to export
                const groupedModalHistory = {};
                let modalGroupOrder = [];

                [...s.history].reverse().forEach(h => {
                    let rNo = h.receiptNo || ("N/A-" + Math.random());

                    if (!groupedModalHistory[rNo]) {
                        let dateStr = "-";
                        try {
                            if (h.date) {
                                if (h.date.seconds) dateStr = new Date(h.date.seconds * 1000).toLocaleDateString();
                                else if (typeof h.date === "string") dateStr = parseDate(h.date);
                            }
                        } catch (e) { dateStr = "Error"; }

                        groupedModalHistory[rNo] = {
                            dateStr: dateStr,
                            receiptNo: h.receiptNo || "-",
                            descriptions: [],
                            itemDisc: 0,
                            explicitDisc: 0,
                            cashAmount: 0
                        };
                        modalGroupOrder.push(rNo);
                    }

                    let desc = h.headName || h.otherHead || h.description || "Fee Payment";
                    let extras = [];
                    if (h.months && h.months.length > 0) {
                        let mStr = h.months.join(', ');
                        if (!desc.includes(mStr)) extras.push(`Months: ${mStr}`);
                    }
                    if (h.transportMonths && h.transportMonths.length > 0) extras.push(`Trans: ${h.transportMonths.join(', ')}`);

                    if (extras.length > 0) desc += ` [${extras.join(' | ')}]`;
                    groupedModalHistory[rNo].descriptions.push(desc);

                    const headLower = (h.headName || '').toLowerCase();
                    if (h.type === 'DISCOUNT' || headLower === 'discount' || headLower === 'concession') {
                        groupedModalHistory[rNo].explicitDisc = (groupedModalHistory[rNo].explicitDisc || 0) + (Number(h.paidAmount) || 0);
                    } else {
                        const amt = Number(h.paidAmount) || 0;
                        const disc = (Number(h.discountUsed) || 0) + (Number(h.discount) || 0);
                        groupedModalHistory[rNo].itemDisc = (groupedModalHistory[rNo].itemDisc || 0) + disc;
                        groupedModalHistory[rNo].cashAmount = (groupedModalHistory[rNo].cashAmount || 0) + amt;
                    }
                });

                modalGroupOrder.forEach((rNo) => {
                    const g = groupedModalHistory[rNo];
                    const descStr = g.descriptions.join('<br><span style="color:#cbd5e1;">+</span> ');
                    let cashPaid = g.cashAmount || 0;
                    let trueDisc = Math.max((g.itemDisc || 0), (g.explicitDisc || 0));
                    let grossAmount = cashPaid + trueDisc;

                    modalTotalPaid += cashPaid;
                    modalTotalDiscount += trueDisc;
                    modalTotalAmount += grossAmount;

                    historyHtml += `
                        <tr style="border-bottom:1px solid #f8fafc;">
                            <td style="padding:6px;">
                                <div style="font-weight:700; color:#334155;">${g.dateStr}</div>
                                <div style="font-size:9px; color:#64748b; display:flex; align-items:center;">
    #${g.receiptNo}
    ${g.receiptNo !== '-' ? '<i class="fas fa-copy" onclick="copyText(\'' + g.receiptNo + '\')" style="margin-left:6px; cursor:pointer; color:#6366f1;" title="Copy Receipt No"></i>' : ''}
</div>

                            </td>
                            <td style="padding:6px; color:#475569;">${descStr}</td>
                            <td style="padding:6px; text-align:right; font-weight:700; color:#0f172a;">₹${grossAmount.toFixed(2)}</td>
                            <td style="padding:6px; text-align:right; font-weight:700; color:#ef4444;">₹${trueDisc.toFixed(2)}</td>
                            <td style="padding:6px; text-align:right; font-weight:800; color:#16a34a;">₹${cashPaid.toFixed(2)}</td>
                        </tr>`;
                });
                historyHtml += `</tbody></table></div>`;
            }

            // --- 6. FINAL HTML ---
            let html = `
                <div class="dash-card" style="text-align:left;">
                    <div class="dash-title" style="text-align:center; margin-bottom:10px;">${s.name} <span style="font-size:12px; color:#64748b;">(${s.class})</span></div>

                    ${monthGridHtml}
                    ${transGridHtml}

                    <div style="font-size:11px; font-weight:800; color:#334155; margin:15px 0 5px 0;">RECENT HISTORY</div>
                    ${historyHtml}

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                        <div style="background:#f8fafc; border:1px solid #cbd5e1; padding:10px; border-radius:8px; text-align:center;">
                            <div style="font-size:10px; color:#64748b; font-weight:700;">TOTAL BILLED AMOUNT</div>
                            <div style="font-size:14px; font-weight:800; color:#0f172a;">₹${(s.totalPaid + s.totalDisc + Math.max(0, s.grandTotalDue)).toFixed(2)}</div>
                        </div>
                        <div style="background:#fee2e2; border:1px solid #fca5a5; padding:10px; border-radius:8px; text-align:center;">
                            <div style="font-size:10px; color:#991b1b; font-weight:700;">TOTAL DISCOUNT</div>
                            <div style="font-size:14px; font-weight:800; color:#ef4444;">₹${s.totalDisc.toFixed(2)}</div>
                        </div>
                        <div style="background:#dcfce7; border:1px solid #86efac; padding:10px; border-radius:8px; text-align:center;">
                            <div style="font-size:10px; color:#166534; font-weight:700;">TOTAL PAID (CASH)</div>
                            <div style="font-size:14px; font-weight:800; color:#22c55e;">₹${s.totalPaid.toFixed(2)}</div>
                        </div>
                        <div style="background:#fff1f2; border:1px solid #fecdd3; padding:10px; border-radius:8px; text-align:center;">
                            <div style="font-size:10px; color:#be123c; font-weight:700;">UNPAID DUE AMOUNT</div>
                            <div style="font-size:14px; font-weight:800; color:#e11d48;">₹${Math.max(0, s.grandTotalDue).toFixed(2)}</div>
                        </div>
                    </div>

                    <div class="dash-actions">
                        <button class="dash-btn" style="background:#334155;" onclick="downloadStudentPDF('${s.id}')">
                            <i class="fas fa-file-pdf"></i> PDF
                        </button>
                        <button class="dash-btn" style="background:#15803d;" onclick="exportSingleStudentExcel('${s.id}')">
                            <i class="fas fa-file-excel"></i> Excel
                        </button>
                    </div>
                    <button onclick="closeModal()" class="dash-btn" style="background:#0f172a; width:100%; margin-top:10px;">Close</button>
                </div>
            `;

            mBody.innerHTML = html;
            document.querySelector('#stuModal .m-head').style.display = 'none';
            document.querySelector('#stuModal .modal-card').style.maxWidth = "550px";
            document.getElementById('stuModal').style.display = 'flex';
        }

        // --- NEW HISTORY MODAL (With Copy Button & Specific Columns) ---
        // --- UPDATED HISTORY MODAL (Fixes Transport & Description) ---
        function openHistoryModal(sid, type, headName = null) {
            const s = rawData.find(x => x.id === sid);
            if (!s) return;

            const container = document.getElementById('itemListArea');
            container.innerHTML = "";

            let historyData = [];
            let totalAmt = 0;
            let title = "";
            let themeColor = "#6366f1";
            let bgTheme = "#eef2ff";

            // Data Filtering Logic
            if (type === 'ITEM') {
                historyData = s.itemHistory; totalAmt = s.extraPaid;
                title = "EXTRA ITEMS"; themeColor = "#6b21a8"; bgTheme = "#f3e8ff";
            } else if (type === 'LATE') {
                historyData = s.lateHistory; totalAmt = s.totalLate;
                title = "LATE FEE"; themeColor = "#991b1b"; bgTheme = "#fee2e2";
            } else if (type === 'DISCOUNT') {
                historyData = s.discHistory; totalAmt = s.totalDisc;
                title = "DISCOUNT"; themeColor = "#3f6212"; bgTheme = "#ecfccb";
            } else if (type === 'HEAD') {
                title = headName.toUpperCase();

                // ✅ FIX 1: Robust Filter for Transport & Tuition
                historyData = s.history.filter(f => {
                    const fName = (f.headName || f.otherHead || "").toLowerCase();
                    const target = headName.toLowerCase();
                    const fType = (f.type || "").toUpperCase();

                    // Agar Transport hai to type 'TRANSPORT' ya naam me transport check kare
                    if (target.includes('transport')) {
                        return fType === 'TRANSPORT' || fName.includes('transport');
                    }
                    // Agar Tuition hai to type 'TUITION'/'PAYMENT' check kare
                    if (target.includes('tuition')) {
                        return fType === 'TUITION' || fType === 'PAYMENT' || fName.includes('tuition');
                    }
                    // Baaki sabke liye naam match kare
                    return fName.includes(target);
                });

                totalAmt = historyData.reduce((sum, item) => sum + (Number(item.paidAmount) || 0), 0);
            }

            // UI Setup
            document.querySelector('#itemModal .m-head').style.background = themeColor;
            document.querySelector('#itemModal .m-head div').innerText = title + " HISTORY";

            if (!historyData || historyData.length === 0) {
                container.innerHTML = `<div style='text-align:center; padding:30px; color:#94a3b8;'>
                    <i class="fas fa-file-invoice" style="font-size:30px; margin-bottom:10px;"></i><br>No payment records found.
                </div>`;
            } else {
                let html = `
                    <div style="margin-bottom:10px; font-weight:bold; color:${themeColor}; display:flex; justify-content:space-between;">
                        <span>Student: ${s.name}</span>
                        <span>Total: ₹${totalAmt}</span>
                    </div>
                    <table style="width:100%; border-collapse:collapse; font-size:12px;">
                        <thead style="background:${bgTheme}; color:${themeColor};">
                            <tr>
                                <th style="padding:10px; text-align:left;">Date & Receipt</th>
                                <th style="padding:10px; text-align:center;">Description</th>
                                <th style="padding:10px; text-align:right;">Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                historyData.forEach(item => {
                    let dateStr = item.date;
                    if (item.date && item.date.seconds) dateStr = new Date(item.date.seconds * 1000).toLocaleString();

                    // ✅ FIX 2: Better Description (Show Months)
                    let desc = item.description || item.headName || item.otherHead || "-";
                    let details = "";

                    // Check for Monthly Fee Data
                    if (item.months && Array.isArray(item.months) && item.months.length > 0) {
                        let mStr = item.months.join(', ');
                        if (!desc.includes(mStr)) details = `<br><span style="font-size:10px; color:#059669; font-weight:bold;">(${mStr})</span>`;
                    }
                    // Check for Transport Fee Data
                    if (item.transportMonths && Array.isArray(item.transportMonths) && item.transportMonths.length > 0) {
                        details = `<br><span style="font-size:10px; color:#059669; font-weight:bold;">(${item.transportMonths.join(', ')})</span>`;
                    }

                    let rNo = item.receiptNo || "N/A";

                    html += `
                        <tr style="border-bottom:1px solid #f1f5f9;">
                            <td style="padding:10px;">
                                <div style="font-weight:700; color:#334155;">${dateStr}</div>
                                <div style="font-size:11px; color:#64748b; margin-top:2px; display:flex; align-items:center;">
                                    #${rNo}
                                    <button class="copy-btn" onclick="copyText('${rNo}')" title="Copy Receipt No">
                                        <i class="fas fa-copy"></i>
                                    </button>
                                </div>
                            </td>
                            <td style="padding:10px; text-align:center; color:#475569;">
                                ${desc} ${details}
                            </td>
                            <td style="padding:10px; text-align:right; font-weight:800; color:#0f172a;">₹${item.paidAmount}</td>
                        </tr>
                    `;
                });

                html += `</tbody></table>`;
                container.innerHTML = html;
            }

            document.getElementById('itemModal').style.display = 'flex';
        }

        // Helper function to copy text
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                // Show a small temporary tooltip or alert
                const btn = event.target.closest('button');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => btn.innerHTML = originalHtml, 1500);
            });
        }

            const container = document.getElementById('itemListArea');

            if (!s.itemHistory || s.itemHistory.length === 0) {
                container.innerHTML = "<div style='text-align:center; padding:20px; color:#999;'>No extra items purchased.</div>";
            } else {
                let html = `

        // =======================================================
        // MASTER EXCEL EXPORT (SMART AUTO-WIDTH & PRO FORMAT)
        // =======================================================
        function exportExcel() {
            // 1. GET CURRENT FILTER VALUES (Jo screen par hai wahi export hoga)
            const fName = document.getElementById('fName').value.toLowerCase();
            const fClass = document.getElementById('fClass').value;
            const fStatus = document.getElementById('fStatus').value;

            // 2. FILTER DATA
            const filtered = rawData.filter(s => {
                const matchName = s.name.toLowerCase().includes(fName) || String(s.stesID).toLowerCase().includes(fName);
                const matchClass = fClass === "" || s.class === fClass;
                const matchStatus = fStatus === "All" ||
                    (fStatus === "Pending" && s.grandTotalDue > 0) ||
                    (fStatus === "Clear" && s.grandTotalDue <= 0);
                return matchName && matchClass && matchStatus;
            });

            if (filtered.length === 0) {
                alert("No student records found to export.");
                return;
            }

            // 3. PREPARE DATA STRUCTURE
            let data = [];

            // --- A. HEADER SECTION (Professional Look) ---
            data.push(["ST. TERESA ENGLISH SCHOOL"]);
            data.push(["MASTER FEE LEDGER REPORT"]);
            data.push(["Session: " + currentSession, "", "", "Generated On: " + new Date().toLocaleDateString()]);
            data.push([]); // Empty Row for spacing

            // --- B. CREATE DYNAMIC HEADERS ---
            let headers = ["Student Name", "ID", "Class", "Father Name"]; // Static Columns

            // Dynamic Heads (Exp, Paid, Due for each fee type)
            dynamicHeads.forEach(h => {
                headers.push(`${h.name} Exp`);
                headers.push(`${h.name} Paid`);
                headers.push(`${h.name} Due`);
            });

            // Summary Columns
            headers.push("Discount", "Late Fee", "Extra Items", "Curr Dues", "Prev Dues", "TOTAL DUES");

            data.push(headers); // Add Header Row to Data

            // --- C. ADD STUDENT ROWS ---
            filtered.forEach(s => {
                let row = [
                    s.name,
                    s.stesID,
                    s.class + (s.section ? ` (${s.section})` : ''),
                    s.fatherName || '-'
                ];

                // Loop through Dynamic Heads
                dynamicHeads.forEach(h => {
                    const d = s.headsData[h.name] || { exp: 0, paid: 0, due: 0 };
                    row.push(d.exp, d.paid, d.due);
                });

                // Fill Summary Data
                row.push(
                    s.totalDisc || 0,
                    s.totalLate || 0,
                    s.extraPaid || 0,
                    s.currentDues || 0,
                    s.prevDue || 0,
                    s.grandTotalDue || 0
                );

                data.push(row);
            });

            // 4. CREATE WORKBOOK
            const ws = XLSX.utils.aoa_to_sheet(data);

            // --- 5. SMART AUTO-WIDTH LOGIC (Ye Naya Hai) ---
            // Hum har column ka data check karenge aur max width set karenge

            // Sabse pehle, data ke har column (index) ke liye loop chalayenge
            const colCount = data[4].length; // Row 4 (index 4) pe headers hain
            let wscols = [];

            for (let i = 0; i < colCount; i++) {
                let maxLen = 10; // Minimum width 10 rakhenge

                // Har row ko check karo ki us column me sabse lamba text kaunsa hai
                // Hum Row 4 se shuru karenge jahan se Headers aur Data hai
                for (let j = 4; j < data.length; j++) {
                    let cellValue = data[j][i];
                    let cellText = cellValue ? String(cellValue) : "";

                    if (cellText.length > maxLen) {
                        maxLen = cellText.length;
                    }
                }

                // Thoda buffer add karenge taaki chipka hua na lage (+2 character space)
                wscols.push({ wch: maxLen + 2 });
            }

            ws['!cols'] = wscols;

            // --- 6. EXPORT FILE ---
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Master_Ledger");

            // File Name with Timestamp
            const dateStr = new Date().toISOString().slice(0, 10);
            XLSX.writeFile(wb, `Fee_Ledger_Export_${dateStr}.xlsx`);
        }

        // --- NEW FUNCTION: CARRY FORWARD DUES TO NEXT SESSION ---

        async function promoteDuesToNextSession() {
            const nextSession = prompt("Enter Next Session Name (e.g. 2026-2027):");
            if (!nextSession) return;

            if (nextSession === currentSession) {
                alert("You cannot carry forward to the SAME session. Please select the target session.");
                return;
            }

            if (!confirm(`Are you sure you want to save Current Total Dues as 'Previous Due' for session ${nextSession}?`)) return;

            const btn = document.createElement('div');
            btn.innerHTML = `<div id="cf-loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); color:white; display:flex; justify-content:center; align-items:center; z-index:9999; flex-direction:column;"><h2>Processing Dues...</h2><p>Do not close window</p></div>`;
            document.body.appendChild(btn);

            try {
                const batchSize = 400;
                let batch = db.batch();
                let count = 0;
                let updatedCount = 0;

                // Abhi jo screen par data loaded hai (rawData), usi ko use karenge
                // rawData me har bache ka 'grandTotalDue' already calculated hai

                for (const student of rawData) {
                    const studentRef = db.collection('students').doc(student.id);
                    // Use base dues without dynamically generated late fine
                    const amountToCarry = (student.currentDues + student.prevDue) || 0;

                    // Nayi field banayenge: dues_2026-2027
                    // Isse purane session (2025-2026) ka data kharab nahi hoga
                    let updateData = {};
                    updateData[`dues_${nextSession}`] = amountToCarry;

                    batch.update(studentRef, updateData);
                    count++;
                    updatedCount++;

                    if (count >= batchSize) {
                        await batch.commit();
                        batch = db.batch();
                        count = 0;
                    }
                }

                if (count > 0) await batch.commit();

                document.getElementById('cf-loader').remove();
                alert(`Success! Dues carried forward for ${updatedCount} students to session ${nextSession}.`);

            } catch (e) {
                document.getElementById('cf-loader').remove();
                console.error(e);
                alert("Error: " + e.message);
            }
        }

            doc.setFont("helvetica", "normal"); doc.text(s.transportRoute || 'No Transport', 135, 45);

            // --- PREPARE DATA ---
            let tableBody = [];
            let totalStatementAmount = 0;
            let totalStatementDiscount = 0;
            let totalStatementPaid = 0;

            if (s.history && s.history.length > 0) {
                // Reverse array to show oldest first (Standard for statement)
                const sortedHistory = [...s.history].reverse();

                const groupedHistory = {};
                let groupOrder = [];

                sortedHistory.forEach((h) => {
                    let rNo = h.receiptNo || ("N/A-" + Math.random());

                    if (!groupedHistory[rNo]) {
                        // ✅ DATE FIX
                        let dateStr = "-";
                        if (h.date) {
                            if (h.date.seconds) dateStr = new Date(h.date.seconds * 1000).toLocaleDateString('en-GB');
                            else if (typeof h.date === "string") dateStr = parseDate(h.date, 'en-GB');
                        }
                        groupedHistory[rNo] = {
                            dateStr: dateStr,
                            receiptNo: h.receiptNo || "-",
                            descriptions: [],
                            itemDisc: 0,
                            explicitDisc: 0,
                            cashAmount: 0
                        };
                        groupOrder.push(rNo);
                    }

                    // Clean Description
                    let desc = h.headName || h.otherHead || h.description || "Fee";
                    if (desc.length > 40) desc = desc.substring(0, 40) + "...";
                    if (h.months && h.months.length > 0) {
                        let mStr = h.months.join(', ');
                        if (!desc.includes(mStr)) desc += ` (${mStr})`;
                    }
                    groupedHistory[rNo].descriptions.push(desc);

                    const headLower = (h.headName || '').toLowerCase();
                    if (h.type === 'DISCOUNT' || headLower === 'discount' || headLower === 'concession') {
                        groupedHistory[rNo].explicitDisc = (groupedHistory[rNo].explicitDisc || 0) + (Number(h.paidAmount) || 0);
                    } else {
                        const amt = Number(h.paidAmount) || 0;
                        const disc = (Number(h.discountUsed) || 0) + (Number(h.discount) || 0);
                        groupedHistory[rNo].itemDisc = (groupedHistory[rNo].itemDisc || 0) + disc;
                        groupedHistory[rNo].cashAmount = (groupedHistory[rNo].cashAmount || 0) + amt;
                    }
                });

                groupOrder.forEach((rNo, index) => {
                    const g = groupedHistory[rNo];
                    const descStr = g.descriptions.join(' + ');
                    let cashPaid = g.cashAmount || 0;
                    let trueDisc = Math.max((g.itemDisc || 0), (g.explicitDisc || 0));
                    let grossAmount = cashPaid + trueDisc;

                    totalStatementPaid += cashPaid;
                    totalStatementDiscount += trueDisc;
                    totalStatementAmount += grossAmount;

                    tableBody.push([
                        index + 1,
                        g.dateStr,
                        g.receiptNo,
                        descStr,
                        "Cash/Online",
                        cashPaid.toFixed(2)
                    ]);
                });
            }

            // --- TABLE GENERATION ---
            doc.autoTable({
                startY: 55,
                head: [['Sr.', 'Date', 'Receipt #', 'Description', 'Mode', 'Amount (Rs.)']],
                body: tableBody,
                theme: 'grid',
                styles: { fontSize: 8, cellPadding: 1.5, valign: 'middle', lineColor: [200], lineWidth: 0.1 },
                headStyles: { fillColor: [51, 65, 85], textColor: 255, fontStyle: 'bold', halign: 'center' },
                columnStyles: {
                    0: { cellWidth: 10, halign: 'center' },
                    1: { cellWidth: 25, halign: 'center' },
                    2: { cellWidth: 25, halign: 'center' },
                    3: { cellWidth: 'auto' },
                    4: { cellWidth: 25, halign: 'center' },
                    5: { cellWidth: 25, halign: 'right', fontStyle: 'bold' }
                },
                foot: [
                    ['', '', '', 'Total Expected Billed Amount', '', `Rs. ${(s.totalPaid + s.totalDisc + Math.max(0, s.grandTotalDue)).toFixed(2)}`],
                    ['', '', '', 'Total Discount Given', '', `Rs. ${s.totalDisc.toFixed(2)}`],
                    ['', '', '', 'Total Paid (Cash)', '', `Rs. ${s.totalPaid.toFixed(2)}`],
                    ['', '', '', { content: 'Unpaid Due Amount', styles: { textColor: [220, 38, 38] } }, '', { content: `Rs. ${Math.max(0, s.grandTotalDue).toFixed(2)}`, styles: { textColor: [220, 38, 38] } }]
                ],
                footStyles: { fillColor: [240, 253, 244], textColor: [22, 101, 52], fontStyle: 'bold', halign: 'right' }
            });

            // --- FOOTER ---
            const finalY = doc.lastAutoTable.finalY + 15;
            if (finalY > 270) doc.addPage();

            doc.setFontSize(8);
            doc.setTextColor(0);
            doc.line(150, finalY, 200, finalY);
            doc.text("Authorized Signatory", 155, finalY + 5);

            doc.save(`${s.name}_Statement.pdf`);
        }

                            <th style="padding:8px; text-align:left;">Item Name</th>
                            <th style="padding:8px; text-align:right;">Amount</th>
                        </tr>
                    </thead>
                    <tbody>`;

                // Show list
                items.forEach(item => {
                    // Date formatting
                    let dStr = parseDate(item.date);

                    html += `
                    <tr style="border-bottom:1px solid #fff7ed;">
                        <td style="padding:8px;">${dStr}</td>
                        <td style="padding:8px;">${item.name}</td>
                        <td style="padding:8px; text-align:right; font-weight:bold; color:#dc2626;">₹${item.amount}</td>
                    </tr>`;
                });

                html += `</tbody></table>
                <div style="padding:10px; font-size:10px; color:#64748b; text-align:center;">
                    * Items are removed from this list automatically when paid via Fee Collection.
                </div>`;
                body.innerHTML = html;
            }
            modal.style.display = 'flex';
        }

        // --- COPY TO CLIPBOARD FUNCTION ---
        function copyText(text) {
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                // Aap chahein to yahan alert laga sakte hain
                // alert("Copied: " + text);

                // Ya bas button ka color thoda change karke indicate karein
                const activeEl = document.activeElement;
                if (activeEl) {
                    const originalColor = activeEl.style.color;
                    activeEl.style.color = "#16a34a"; // Green
                    setTimeout(() => activeEl.style.color = originalColor, 500);
                }
            }).catch(err => console.error('Failed to copy', err));
        }

        // --- NEW SIDEBAR FUNCTIONS ---

        function toggleSidebar() {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        // --- CLOSE MODAL ON OUTSIDE CLICK ---
        window.onclick = function (event) {
            const stuModal = document.getElementById('stuModal');
            const itemModal = document.getElementById('itemModal');

            // Agar Student Modal ke background (dark area) pe click hua
            if (event.target === stuModal) {
                closeModal();
            }

            // Agar Item History Modal ke background pe click hua
            if (event.target === itemModal) {
                itemModal.style.display = "none";
            }
        }

        // admin-fees.html aur baaki data wale pages ke liye
        firebase.auth().onAuthStateChanged((user) => {
            const isLoggedIn = sessionStorage.getItem("isLoggedIn") === "true";
            const userData = JSON.parse(sessionStorage.getItem("userData") || "{}");

            if (user && isLoggedIn && userData.role === 'admin') {
                db.collection('admins').doc(user.uid).get()
                    .then((doc) => {
                        if (doc.exists && doc.data().role === 'SuperAdmin') {
                            init();
                        } else {
                            auth.signOut().then(() => window.location.replace("admin-login.html"));
                        }
                    })
                    .catch((err) => {
                        console.error("Auth check error:", err);
                        document.getElementById('tableBody').innerHTML =
                            `<tr><td colspan="50" style="text-align:center;padding:40px;color:red;">
                             ⚠️ Load failed: ${err.message}<br>
                             <button onclick="location.reload()" style="margin-top:10px;padding:8px 20px;background:#6366f1;color:white;border:none;border-radius:8px;cursor:pointer;">
                             Retry</button></td></tr>`;
                    });
            } else {
                window.location.replace("admin-login.html");
            }
        });

    </script>

</body>

</html>
