<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates | STES Admin</title>
    
        <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
 

    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --primary: #0f172a; 
            --gold: #b45309; 
            --blue: #2563eb;
            --bg: #f1f5f9; 
        }
        
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100vh; color: #333; }
        * { box-sizing: border-box; text-decoration: none; }

        /* --- HEADER DESIGN --- */
        .header { 
            background: white; 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
            position: sticky; top: 0; z-index: 100;
        }

        .page-title { 
            font-size: 20px; font-weight: 700; color: var(--primary); margin: 0; 
            display: flex; align-items: center; gap: 10px;
        }
        .page-title i { color: var(--gold); background: #fff7ed; padding: 8px; border-radius: 8px; }

        /* Dashboard Button Style */
        .dash-btn {
            background: white;
            border: 1px solid #e2e8f0;
            color: #64748b;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            display: flex; align-items: center; gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        
        .dash-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(15, 23, 42, 0.15);
        }

        /* --- CONTENT GRID --- */
        .container { padding: 40px 20px; max-width: 900px; margin: 0 auto; width: 100%; }
        
        .section-label { 
            font-size: 13px; font-weight: 600; color: #94a3b8; 
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; display: block;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 25px; 
        }

        /* CARD STYLE */
        .cert-card {
            background: white; 
            border-radius: 16px; 
            padding: 30px 20px;
            text-align: center; 
            position: relative; overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); 
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cert-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
            border-color: var(--blue);
        }

        .icon-box {
            width: 60px; height: 60px; border-radius: 50%; 
            margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; transition: transform 0.3s;
        }
        
        .cert-card:hover .icon-box { transform: scale(1.1) rotate(5deg); }

        .c-name { font-weight: 700; font-size: 16px; margin-bottom: 5px; display: block; color: var(--primary); }
        .c-desc { font-size: 12px; color: #64748b; line-height: 1.5; }

        /* Theme Colors */
        .theme-blue { background: #eff6ff; color: #2563eb; }
        .theme-gold { background: #fffbeb; color: #b45309; }
        .theme-green { background: #f0fdf4; color: #16a34a; }

    </style>
</head>
<body>

    <div class="header">
        <div class="page-title">
            <i class="fas fa-shapes"></i>
            <span>Certificate Hub</span>
        </div>
        
        <a href="admin-dashboard.html" class="dash-btn">
            <i class="fas fa-th-large"></i> Back to Dashboard
        </a>
    </div>

    <div class="container">
        <span class="section-label">Available Documents</span>
        
        <div class="grid">
            
            <a href="admin-tc.html" class="cert-card">
                <div class="icon-box theme-blue"><i class="fas fa-file-export"></i></div>
                <span class="c-name">Transfer Certificate</span>
                <span class="c-desc">Generate School Leaving & Character Certificate (TC/SLC)</span>
            </a>

            <a href="admin-bonafide.html" class="cert-card">
                <div class="icon-box theme-gold"><i class="fas fa-id-badge"></i></div>
                <span class="c-name">Bonafide Certificate</span>
                <span class="c-desc">Proof of student's enrollment and current studying status</span>
            </a>

            <div class="cert-card" style="opacity: 0.6; cursor: not-allowed;">
                <div class="icon-box theme-green"><i class="fas fa-award"></i></div>
                <span class="c-name">Character Only</span>
                <span class="c-desc">Special character certificate (Coming Soon)</span>
            </div>

        </div>
    </div>

</body>
</html>
