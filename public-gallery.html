<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>St. Teresa School Gallery | Perfect Zoom</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; user-select: none; -webkit-tap-highlight-color: transparent; }
        .header { text-align: center; margin-bottom: 25px; }
        h1 { color: #333; font-size: 24px; margin-bottom: 15px; }
        
        .filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .filters button { background: white; border: 1px solid #ddd; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .filters button:hover, .filters button.active { background: #1a73e8; color: white; border-color: #1a73e8; box-shadow: 0 4px 10px rgba(26, 115, 232, 0.3); }
        .count-badge { background: rgba(0,0,0,0.08); padding: 2px 6px; border-radius: 50%; font-size: 11px; font-weight: bold; }
        .active .count-badge { background: rgba(255,255,255,0.3); color: white; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; position: relative; transition: transform 0.2s; }
        .card img, .card video { width: 100%; height: 180px; object-fit: cover; display: block; }
        .play-overlay { position: absolute; top: 10px; right: 10px; background: rgba(26, 115, 232, 0.85); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; justify-content: center; align-items: center; flex-direction: column; overflow: hidden; }
        .close-btn { position: absolute; top: 20px; right: 20px; color: white; font-size: 35px; cursor: pointer; z-index: 1005; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 24px; background: rgba(0,0,0,0.3); border: none; padding: 15px; cursor: pointer; z-index: 1002; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .prev-btn { left: 15px; } .next-btn { right: 15px; }

        .modal-img-container { width: 100%; height: 85%; display: flex; justify-content: center; align-items: center; overflow: visible; touch-action: none; }
        .modal-img, .modal-video { max-width: 100%; max-height: 100%; transform-origin: center center; will-change: transform; }

        .modal-actions { position: absolute; bottom: 30px; display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 1005; pointer-events: none; }
        .action-btn { background: white; color: black; border: none; padding: 10px 20px; border-radius: 30px; text-decoration: none; font-size: 14px; font-weight: 600; cursor: pointer; pointer-events: auto; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .share-btn { background: #25D366; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📸 St. Teresa Gallery</h1>
        <div class="filters">
            <button class="active" onclick="filterGallery('all', this)">All <span class="count-badge" id="cnt-all">0</span></button>
            <button onclick="filterGallery('General', this)">General <span class="count-badge" id="cnt-General">0</span></button>
            <button onclick="filterGallery('Events', this)">Events <span class="count-badge" id="cnt-Events">0</span></button>
            <button onclick="filterGallery('Sports', this)">Sports <span class="count-badge" id="cnt-Sports">0</span></button>
            <button onclick="filterGallery('Classroom', this)">Classroom <span class="count-badge" id="cnt-Classroom">0</span></button>
            <button onclick="filterGallery('video', this)" style="color:#1a73e8;"><i class="fas fa-play"></i> Videos <span class="count-badge" id="cnt-video">0</span></button>
        </div>
    </div>

    <div class="gallery-grid" id="galleryContainer"></div>

    <div id="imageModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <button class="nav-btn prev-btn" id="mPrev" onclick="changeImage(-1)">&#10094;</button>
        <button class="nav-btn next-btn" id="mNext" onclick="changeImage(1)">&#10095;</button>
        <div class="modal-img-container" id="imgContainer"></div>
        <div class="modal-actions">
            <div id="modalTitle" style="color:white; margin-bottom:15px; font-size:18px; font-weight:600;"></div>
            <div style="display:flex; gap:10px;">
                <button onclick="shareMedia()" class="action-btn share-btn"><i class="fas fa-share-alt"></i> Share</button>
                <a id="downloadBtn" href="#" class="action-btn" target="_blank" style="margin-bottom:10px;"><i class="fas fa-download"></i> Save</a>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyA2xmYtteRPlX8sa9p9VRE36dP2cnQnJ8k",
  authDomain: "sample-school-13ca4.firebaseapp.com",
  projectId: "sample-school-13ca4",
  storageBucket: "sample-school-13ca4.firebasestorage.app",
  messagingSenderId: "198448853287",
  appId: "1:198448853287:web:778646f4cb56a9ba7ff902"
};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allMedia = [], currentMedia = [], currentIndex = 0;

        db.collection('gallery').orderBy('createdAt', 'desc').onSnapshot(snap => {
            allMedia = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            updateCounts();
            const activeBtn = document.querySelector('.filters button.active');
            let cat = activeBtn ? activeBtn.innerText.split(' ')[0] : 'all';
            if(activeBtn && activeBtn.innerText.includes("All")) cat = 'all';
            filterGallery(cat, activeBtn);
        });

        function updateCounts() {
            const counts = { 
                all: allMedia.length, 
                General: allMedia.filter(m => m.category === 'General' && m.type !== 'video').length, 
                Events: allMedia.filter(m => m.category === 'Events' && m.type !== 'video').length, 
                Sports: allMedia.filter(m => m.category === 'Sports' && m.type !== 'video').length, 
                Classroom: allMedia.filter(m => m.category === 'Classroom' && m.type !== 'video').length,
                video: allMedia.filter(m => m.type === 'video').length
            };
            Object.keys(counts).forEach(key => { if(document.getElementById('cnt-'+key)) document.getElementById('cnt-'+key).innerText = counts[key]; });
        }

        function renderGallery(items) {
            const container = document.getElementById('galleryContainer'); container.innerHTML = '';
            items.forEach((item, index) => {
                const isVid = item.type === 'video';
                container.innerHTML += `<div class="card" onclick="openModal(${index})">
                    ${isVid ? `<video src="${item.imageUrl}"></video><div class="play-overlay"><i class="fas fa-play"></i></div>` : `<img src="${item.imageUrl}" loading="lazy">`}
                    <div style="padding:10px; text-align:center;"><div style="font-weight:600; font-size:13px; color:#333;">${item.title}</div></div>
                </div>`;
            });
        }

        function filterGallery(type, btn) {
            if(btn) { document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
            if (type === 'all' || type === 'All') currentMedia = allMedia;
            else if (type === 'video' || type === 'Videos') currentMedia = allMedia.filter(m => m.type === 'video');
            else currentMedia = allMedia.filter(m => m.category === type && m.type !== 'video');
            renderGallery(currentMedia);
        }

        // --- GESTURE LOGIC (FROM YOUR ORIGINAL WORKING FILE) ---
        let currentScale = 1, currentX = 0, currentY = 0;
        let startX = 0, startY = 0, initialPinchDistance = 0, startScale = 1;
        let isDragging = false, isPinching = false, lastPinchTime = 0, lastTap = 0;

        function openModal(index) { currentIndex = index; updateModal(); document.getElementById('imageModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('imageModal').style.display = 'none'; document.getElementById('imgContainer').innerHTML = ''; resetTransform(); }

        function updateModal() {
            const item = currentMedia[currentIndex];
            const container = document.getElementById('imgContainer');
            container.innerHTML = item.type === 'video' ? `<video id="fullMedia" class="modal-video" src="${item.imageUrl}" controls autoplay></video>` : `<img id="fullMedia" class="modal-img" src="${item.imageUrl}">`;
            document.getElementById('modalTitle').innerText = item.title;
            document.getElementById('downloadBtn').href = item.imageUrl.replace('/upload/', '/upload/fl_attachment/');
            resetTransform();
        }

        function changeImage(dir) { if(currentScale > 1) return; currentIndex = (currentIndex + dir + currentMedia.length) % currentMedia.length; updateModal(); }

        function updateTransform(withTransition = false) {
            const el = document.getElementById('fullMedia'); if(!el) return;
            el.style.transition = withTransition ? "transform 0.2s ease-out" : "none";
            el.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
            // Hide nav buttons if zoomed
            const nav = document.querySelectorAll('.nav-btn');
            nav.forEach(b => b.style.display = currentScale > 1 ? 'none' : 'flex');
        }

        function resetTransform() { currentScale = 1; currentX = 0; currentY = 0; updateTransform(true); }

        const imgContainer = document.getElementById('imgContainer');
        imgContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isPinching = true; isDragging = false;
                initialPinchDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                startScale = currentScale;
            } else if (e.touches.length === 1) {
                isPinching = false; isDragging = true;
                startX = e.touches[0].clientX; startY = e.touches[0].clientY;
            }
        });

        imgContainer.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && isPinching) {
                e.preventDefault();
                const newDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                currentScale = Math.min(Math.max(1, startScale * (newDist / initialPinchDistance)), 4);
                updateTransform(false);
            } else if (e.touches.length === 1 && isDragging && currentScale > 1) {
                e.preventDefault();
                const diffX = e.touches[0].clientX - startX; const diffY = e.touches[0].clientY - startY;
                const el = document.getElementById('fullMedia');
                el.style.transform = `translate(${currentX + diffX}px, ${currentY + diffY}px) scale(${currentScale})`;
            }
        });

        imgContainer.addEventListener('touchend', (e) => {
            let currentTime = new Date().getTime();
            if (isPinching) { isPinching = false; lastPinchTime = currentTime; updateTransform(true); return; }
            if (isDragging) {
                const diffX = e.changedTouches[0].clientX - startX; const diffY = e.changedTouches[0].clientY - startY;
                if (currentScale === 1) { if (diffX > 60) changeImage(-1); else if (diffX < -60) changeImage(1); }
                else { currentX += diffX; currentY += diffY; updateTransform(true); }
                isDragging = false;
            }
            // Double Tap Fix
            if (e.changedTouches.length === 1 && (currentTime - lastPinchTime > 500)) {
                if (currentTime - lastTap < 300) { if (currentScale > 1) resetTransform(); else { currentScale = 2.5; updateTransform(true); } }
                lastTap = currentTime;
            }
        });

        function shareMedia() {
            const item = currentMedia[currentIndex];
            if (navigator.share) navigator.share({ title: item.title, text: item.title, url: item.imageUrl });
            else window.open(`https://wa.me/?text=${encodeURIComponent(item.title + " " + item.imageUrl)}`);
        }
    </script>
</body>
</html>
