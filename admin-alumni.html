<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Alumni</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="config.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; padding: 20px; }
        .admin-container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }

        .img-preview-box { text-align: center; margin: 15px 0; padding: 15px; border: 2px dashed #ccc; border-radius: 10px; background: #fafafa; }
        #preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid #1a73e8; display: none; margin: 0 auto 10px; }

        .save-btn { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: 600; }
        .save-btn:hover { background: #0d47a1; }

        .list-item { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px; border-bottom: 1px solid #eee; margin-top: 10px; }
        .del-btn { color: #ff4444; cursor: pointer; background: #ffebee; padding: 8px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="admin-container">
    <a href="admin-dashboard.html" style="text-decoration: none; color: #666; font-size: 14px;"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    <h2><i class="fas fa-user-graduate"></i> Add Successful Alumni</h2>

    <div class="form-group">
        <label>Alumni Name</label>
        <input type="text" id="aName" placeholder="Ex: Rahul Verma">
    </div>

    <div class="form-group" style="display: flex; gap: 15px;">
        <div style="flex: 1;">
            <label>Batch (Passing Year)</label>
            <input type="number" id="aBatch" placeholder="Ex: 2018">
        </div>
        <div style="flex: 1;">
            <label>Current Job / Position</label>
            <input type="text" id="aJob" placeholder="Ex: Software Engineer at Google">
        </div>
    </div>

    <div class="img-preview-box">
        <label>Alumni Photo</label>
        <img id="preview-img" src="" alt="Preview">
        <input type="file" id="aPhotoFile" accept="image/*" onchange="previewFile(event)">
    </div>

    <button onclick="saveAlumni()" id="saveBtn" class="save-btn">
        <i class="fas fa-plus-circle"></i> Add to Success Stories
    </button>

    <div style="margin-top: 30px;">
        <h3>Existing Alumni List</h3>
        <div id="existing-list">Loading...</div>
    </div>
</div>

<script>
    // --- FIREBASE & CLOUDINARY CONFIG ---

    const cloudName = "dngejhffd"; 
    const uploadPreset = "school_gallery";

    // Preview
    function previewFile(event) {
        const file = event.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(){
                const output = document.getElementById('preview-img');
                output.src = reader.result;
                output.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    // Save
    async function saveAlumni() {
        const name = document.getElementById('aName').value;
        const batch = document.getElementById('aBatch').value;
        const job = document.getElementById('aJob').value;
        const fileInput = document.getElementById('aPhotoFile');
        const btn = document.getElementById('saveBtn');

        if(!name || !job || !fileInput.files[0]) {
            alert("Please fill Name, Job and select a Photo.");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = 'Uploading...';

        try {
            const fd = new FormData();
            fd.append('file', fileInput.files[0]);
            fd.append('upload_preset', uploadPreset);

            const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, { method: 'POST', body: fd });
            const json = await res.json();
            const photoUrl = json.secure_url;

            await db.collection('school_alumni').add({
                name: name,
                batch: batch,
                job: job,
                photoUrl: photoUrl,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("Alumni Added!");
            location.reload();

        } catch(error) {
            console.error(error);
            alert("Error: " + error.message);
            btn.disabled = false;
        }
    }

    // Load List
    function loadAlumni() {
        const listDiv = document.getElementById('existing-list');
        db.collection('school_alumni').orderBy('timestamp', 'desc').get().then((snap) => {
            if(snap.empty) { listDiv.innerHTML = "<p>No alumni added yet.</p>"; return; }
            listDiv.innerHTML = '';
            snap.forEach(doc => {
                const data = doc.data();
                listDiv.innerHTML += `
                    <div class="list-item">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${data.photoUrl}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                            <div>
                                <b>${data.name}</b> <small>(${data.batch})</small><br>
                                <small style="color:#1a73e8;">${data.job}</small>
                            </div>
                        </div>
                        <i class="fas fa-trash del-btn" onclick="deleteAlumni('${doc.id}')"></i>
                    </div>`;
            });
        });
    }

    function deleteAlumni(id) {
        if(confirm('Remove this alumni?')) {
            db.collection('school_alumni').doc(id).delete().then(() => loadAlumni());
        }
    }

        // 🟢 SECURE INITIALIZATION 🟢
    // admin-fees.html aur baaki data wale pages ke liye
firebase.auth().onAuthStateChanged((user) => {
    const isLoggedIn = sessionStorage.getItem("isLoggedIn") === "true";
    const userData = JSON.parse(sessionStorage.getItem("userData") || "{}");

    if (user && isLoggedIn && userData.role === 'admin') {
        // Asli test
        db.collection('admins').doc(user.uid).get().then((doc) => {
            if (doc.exists && doc.data().role === 'SuperAdmin') {

                loadAlumni(); // <-- Yahan page ka main function call hoga

            } else {
                auth.signOut().then(() => window.location.replace("admin-login.html"));
            }
        });
    } else {
        window.location.replace("admin-login.html");
    }
});

</script>
</body>
</html>
