<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Verification | STES</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { margin: 0; padding: 20px; background: #f8fafc; font-family: 'Outfit', sans-serif; display: flex; justify-content: center; min-height: 100vh; }

        .verify-card {
            background: white; width: 100%; max-width: 400px;
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden; text-align: center; position: relative;
        }

        .header { background: #1e293b; padding: 20px; color: white; }
        .status-badge {
            background: #22c55e; color: white; padding: 5px 15px; border-radius: 20px;
            font-size: 12px; font-weight: bold; display: inline-flex; align-items: center; gap: 5px;
            margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .photo-circle {
            width: 120px; height: 120px; border-radius: 50%; border: 4px solid white;
            margin: -60px auto 15px auto; overflow: hidden; background: #f1f5f9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; z-index: 10;
        }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .info-list { padding: 0 25px 25px 25px; text-align: left; }
        .info-item { border-bottom: 1px dashed #e2e8f0; padding: 12px 0; display: flex; justify-content: space-between; }
        .label { color: #64748b; font-size: 13px; font-weight: 600; }
        .value { color: #1e293b; font-weight: 700; font-size: 14px; }

        #loading { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .error-msg { color: #ef4444; font-weight: bold; padding: 20px; display: none; }
    </style>
</head>
<body>

    <div id="loading">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="color:#3b82f6;"></i>
        <p style="margin-top:15px; color:#64748b;">Verifying Student Data...</p>
    </div>

    <div class="verify-card" id="card" style="display: none;">
        <div class="header">
            <h2 style="margin:0;">St. Teresa School</h2>
            <div class="status-badge"><i class="fas fa-check-circle"></i> VERIFIED STUDENT</div>
        </div>

        <div class="photo-circle">
            <img id="vPhoto" src="">
        </div>

        <h2 id="vName" style="margin:0 0 5px 0; color:#1e293b;">-</h2>
        <p id="vID" style="margin:0 0 20px 0; color:#6366f1; font-weight:bold;">-</p>

        <div class="info-list">
            <div class="info-item">
                <span class="label">Class / Section</span>
                <span class="value" id="vClass">-</span>
            </div>
            <div class="info-item">
                <span class="label">Roll Number</span>
                <span class="value" id="vRoll">-</span>
            </div>
            <div class="info-item">
                <span class="label">Father's Name</span>
                <span class="value" id="vFather">-</span>
            </div>
            <div class="info-item">
                <span class="label">Current Status</span>
                <span class="value" id="vStatus" style="color:#16a34a;">Active</span>
            </div>
        </div>

        <div style="background:#f8fafc; padding:10px; font-size:11px; color:#94a3b8;">
            Generated from Official Records
        </div>
    </div>

    <div id="errorBox" class="verify-card error-msg">
        <i class="fas fa-exclamation-triangle fa-3x"></i><br><br>
        Student Record Not Found!<br>
        <span style="font-size:12px; font-weight:normal; color:#666;">This admit card might be invalid or fake.</span>
    </div>

    <script>
        // 1. FIREBASE CONFIG (Same as Admin)

        // 2. GET ID FROM URL
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if(!id) {
            showError();
        } else {
            // 3. FETCH DATA
            db.collection('students').doc(id).get().then(doc => {
                if (doc.exists) {
                    const s = doc.data();

                    document.getElementById('vName').innerText = s.name;
                    document.getElementById('vID').innerText = s.stesID || "N/A";
                    document.getElementById('vClass').innerText = `${s.class} (${s.section})`;
                    document.getElementById('vRoll').innerText = s.roll || "-";
                    document.getElementById('vFather').innerText = s.fatherName;
                    document.getElementById('vStatus').innerText = s.status;
                    document.getElementById('vPhoto').src = s.photo || "https://via.placeholder.com/150?text=No+Img";

                    // Show Card
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('card').style.display = 'block';
                } else {
                    showError();
                }
            }).catch(err => {
                console.error(err);
                showError();
            });
        }

        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorBox').style.display = 'block';
        }
    </script>
</body>
</html>
