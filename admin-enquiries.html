<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Enquiries</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; background: #f3f4f6; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: #333; font-weight: 600; display: flex; align-items: center; gap: 5px; }

        .msg-container { max-width: 850px; margin: auto; }

        .msg-card {
            background: white; padding: 25px; border-radius: 15px; margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); border-left: 6px solid #ccc;
        }
        .msg-card.unread { border-left: 6px solid #1a73e8; background: #f0f7ff; }

        .top-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }

        .sender-info h4 { margin: 0; color: #333; font-size: 18px; font-weight: 700; }

        /* PHONE NUMBER STYLE (Bada aur Saaf) */
        .phone-display { 
            font-size: 16px; color: #1a73e8; font-weight: 600; margin-top: 5px; 
            display: flex; align-items: center; gap: 8px;
        }

        .date-badge { background: #eee; padding: 5px 12px; border-radius: 6px; font-size: 12px; color: #555; font-weight: 500; }

        .message-box {
            background: #fafafa; padding: 15px; border-radius: 10px; margin: 15px 0;
            border: 1px dashed #bbb; color: #444; font-size: 15px; line-height: 1.6;
        }

        .action-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }

        .btn {
            border: none; padding: 12px 18px; border-radius: 8px; cursor: pointer;
            font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; 
            text-decoration: none; transition: 0.2s;
        }

        .btn-whatsapp { background: #25D366; color: white; }
        .btn-whatsapp:hover { background: #1ebe57; transform: translateY(-2px); }

        .btn-call { background: #333; color: white; }
        .btn-call:hover { background: #000; transform: translateY(-2px); }

        .btn-read { background: #1a73e8; color: white; margin-left: auto; }
        .btn-delete { background: #fee2e2; color: #dc2626; }

        .status-read { margin-left: auto; color: #2ecc71; font-weight: 700; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fas fa-inbox"></i> Inbox</h2>
        <a href="admin-dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>

    <div class="msg-container" id="msgList">
        <p style="text-align:center;">Loading messages...</p>
    </div>

            <script>
        // CONFIG

        // 1. CLEANER FUNCTION
        function cleanPhone(phone) {
            if(!phone) return "";
            // Sirf digits rakho (Space, -, brackets sab hata do)
            let p = String(phone).replace(/\D/g, ''); 

            // Agar 10 digit hai to aage 91 lagao
            if(p.length === 10) return "91" + p;
            // Agar 0 se start ho raha hai (e.g. 098...) to 0 hata kar 91 lagao
            if(p.length > 10 && p.startsWith('0')) return "91" + p.substring(1);

            return p;
        }

        // 2. LOAD MESSAGES
            // 🟢 SECURE INITIALIZATION 🟢
        // 🟢 SECURE INITIALIZATION (Database Cross-Check ke sath) 🟢
    firebase.auth().onAuthStateChanged((user) => {
        const isLoggedIn = sessionStorage.getItem("isLoggedIn") === "true";
        const userData = JSON.parse(sessionStorage.getItem("userData") || "{}");

        if (user && isLoggedIn && userData.role === 'admin') {
            // Asli test: Kya ye SuperAdmin hai?
            db.collection('admins').doc(user.uid).get().then((doc) => {
                if (doc.exists && doc.data().role === 'SuperAdmin') {

                    // 👉 ADMIN VERIFIED! LOAD ENQUIRIES
                    db.collection('enquiries').orderBy('timestamp', 'desc').onSnapshot(snapshot => {
                        // FIX: ID 'msgList' sahi kardi gayi hai
                        const container = document.getElementById('msgList');
                        container.innerHTML = '';

                        if (snapshot.empty) {
                            container.innerHTML = '<p style="text-align:center; color:#666;">No enquiries found.</p>';
                            return;
                        }

                        snapshot.forEach(doc => {
                            const data = doc.data();
                            const id = doc.id;
                            const date = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleString() : 'Just now';

                            // Status text aur class fix
                            const isRead = data.status === 'read';
                            const statusText = isRead ? 'Read' : 'Unread';
                            const statusClass = isRead ? 'status-resolved' : 'status-pending';
                            const statusStyle = isRead ? 'color: #16a34a; background: #dcfce7;' : 'color: #ef4444; background: #fee2e2;';

                            container.innerHTML += `
                                <div class="msg-card">
                                    <div class="msg-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                                        <b style="font-size:18px; color:#333;">${data.name}</b>
                                        <span style="font-size: 12px; color: #666; background:#eee; padding:4px 8px; border-radius:6px;">${date}</span>
                                    </div>
                                    <div style="font-size: 14px; color: #555; margin-bottom: 15px; border-bottom:1px dashed #ccc; padding-bottom:10px;">
                                        <i class="fas fa-envelope"></i> ${data.email} <span style="margin:0 10px;">|</span> 
                                        <i class="fas fa-phone" style="color:#1a73e8;"></i> <b>${data.phone}</b>
                                    </div>
                                    <div class="msg-body" style="background:#f8fafc; padding:15px; border-radius:8px; border:1px solid #e2e8f0; color:#444; margin-bottom:15px; line-height:1.6;">
                                        ${data.message}
                                    </div>
                                    <div class="msg-actions" style="display:flex; justify-content:space-between; align-items:center;">
                                        <span style="padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; ${statusStyle}">
                                            ${isRead ? '<i class="fas fa-check-double"></i> ' : '<i class="fas fa-envelope"></i> '}${statusText}
                                        </span>
                                        <div style="display:flex; gap:10px;">
                                            ${!isRead ? `<button onclick="markAsRead('${id}')" class="btn" style="background:#1a73e8; color:white;"><i class="fas fa-check"></i> Mark as Read</button>` : ''}
                                            <button onclick="deleteMsg('${id}')" class="btn" style="background:#fee2e2; color:#dc2626;"><i class="fas fa-trash"></i> Delete</button>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                    });

                } else {
                    firebase.auth().signOut().then(() => window.location.replace("admin-login.html"));
                }
            }).catch((error) => {
                console.error("Error verifying admin:", error);
                firebase.auth().signOut().then(() => window.location.replace("admin-login.html"));
            });
        } else {
            console.warn("Unauthorized access! Redirecting...");
            window.location.replace("admin-login.html");
        }
    });

        function markAsRead(id) { db.collection('enquiries').doc(id).update({ status: 'read' }); }
        function deleteMsg(id) { if(confirm("Delete permanently?")) db.collection('enquiries').doc(id).delete(); }
    </script>

</body>
</html>
