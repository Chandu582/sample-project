<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Location</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #1a73e8; --dark: #0d47a1; --text: #333; --light-bg: #f8f9fa; }

        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }

        /* SECTION CONTAINER */
        .location-section {
            padding: 60px 20px;
            background: var(--light-bg);
        }

        .container {
            max-width: 1100px; margin: auto;
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px;
            align-items: center; background: white;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        /* LEFT SIDE: INFO */
        .info-box { padding: 40px; }

        .section-title {
            font-size: 24px; font-weight: 700; color: var(--primary);
            margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;
        }
        .school-name {
            font-size: 32px; font-weight: 800; color: #222; margin: 0 0 25px;
            line-height: 1.2;
        }

        /* INFO ITEMS */
        .contact-item { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 25px; }

        .icon-circle {
            width: 50px; height: 50px; background: #e3f2fd; color: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0; transition: 0.3s;
        }
        .contact-item:hover .icon-circle { background: var(--primary); color: white; transform: rotate(15deg); }

        .item-text h4 { margin: 0 0 5px; font-size: 16px; font-weight: 600; color: #444; }
        .item-text p { margin: 0; font-size: 14px; color: #666; line-height: 1.5; }

        /* DIRECTIONS BUTTON */
        .btn-direction {
            display: inline-flex; align-items: center; gap: 10px;
            background: var(--primary); color: white; text-decoration: none;
            padding: 14px 30px; border-radius: 30px; font-weight: 600;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(26, 115, 232, 0.4);
            margin-top: 10px;
        }
        .btn-direction:hover { background: var(--dark); transform: translateY(-2px); }

        /* RIGHT SIDE: MAP */
        .map-box { height: 100%; min-height: 450px; position: relative; }
        iframe { width: 100%; height: 100%; border: 0; }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .map-box { min-height: 300px; }
            .info-box { padding: 30px; }
            .school-name { font-size: 26px; }
        }
    </style>
    <script src="config.js"></script>
</head>
<body>

    <section class="location-section">
        <div class="container">

            <div class="info-box">
                <div class="section-title">Visit Us</div>
                <h2 class="school-name">St. Teresa English School</h2>

                <div class="contact-item">
                    <div class="icon-circle"><i class="fas fa-map-marker-alt"></i></div>
                    <div class="item-text">
                        <h4>Our Location</h4>
                        <p>Lalganj, Chandi (NALANDA)<br>Bihar - 803108</p>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="icon-circle"><i class="fas fa-phone-alt"></i></div>
                    <div class="item-text">
                        <h4>Contact Numbers</h4>
                        <p>+91 76328 52762 (Office)<br>+91 94302 87995 (Admission)</p>
                    </div>
                </div>

                <div class="contact-item">
                    <div class="icon-circle"><i class="fas fa-clock"></i></div>
                    <div class="item-text">
                        <h4>School Hours</h4>
                        <p>Mon - Sat: 08:00 AM - 02:00 PM<br><span style="color:#d32f2f; font-size:12px;">(Sunday Closed)</span></p>
                    </div>
                </div>

                <a href="https://www.google.com/maps/dir//St.+Teresa+English+School+Lalganj+Chandi+Nalanda" 
                   target="_blank" class="btn-direction">
                    <i class="fas fa-location-arrow"></i> Get Directions
                </a>
            </div>

            <div class="map-box">
                <iframe 
                    src="https://maps.google.com/maps?q=St.+Teresa+English+School+Lalganj+Chandi+Nalanda&t=&z=15&ie=UTF8&iwloc=&output=embed" 
                    allowfullscreen="" loading="lazy">
                </iframe>
            </div>

        </div>
    </section>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "St. Teresa English School",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Lalganj, Chandi",
        "addressLocality": "Nalanda",
        "addressRegion": "Bihar",
        "postalCode": "803108",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "25.3265", 
        "longitude": "85.4567" 
      },
      "url": "https://yourschoolwebsite.com",
      "telephone": "+919876543210",
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": [
            "Monday",
            "Tuesday",
            "Wednesday",
            "Thursday",
            "Friday",
            "Saturday"
          ],
          "opens": "08:00",
          "closes": "14:00"
        }
      ]
    }
    </script>

</body>
</html>
